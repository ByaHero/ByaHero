<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../../assets/images/byaheroLogoBlue.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost and Found - ByaHero</title>
    
    <link href="../../css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" />

    <style>
        :root {
            --bs-primary: #1e3a8a;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #f8fafc;
            padding-top: 54px;
            padding-bottom: 80px;
        }

        .passenger-topbar-sticky {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            width: 100%;
            z-index: 2002 !important;
        }

        .hover-bg-white-10:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .custom-form-border {
            border: 1px solid var(--bs-primary) !important;
            box-shadow: none !important;
        }
        .btn-custom-toggle {
            background-color: #adb5bd !important;
            color: white !important;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.2s ease;
        }
        .btn-check:checked + .btn-custom-toggle {
            background-color: var(--bs-primary) !important;
            color: white !important;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-light">
    <!-- Header Top Bar Component -->
    <div class="bg-primary d-flex align-items-center justify-content-between rounded-bottom-4 px-3 shadow-sm position-absolute top-0 start-0 z-3 w-100 passenger-topbar-sticky" style="height: 40px;">
        <div class="d-flex align-items-center">
            <a href="../index.html" class="text-white text-decoration-none d-flex align-items-center p-1 rounded-circle hover-bg-white-10">
                <span class="material-symbols-rounded text-white" style="font-size: 24px;">arrow_back</span>
            </a>
            <h6 class="h5 mb-0 text-white fw-normal ms-2" style="font-size: 1.1rem;">Lost and Found</h6>
        </div>
    </div>

    <div class="container mt-4 pb-5 mb-5 text-center px-4">
        <!-- Status Display Message -->
        <div class="alert alert-success border-0 rounded-4 shadow-sm mb-3 d-none animate-fade" id="submitNotice"></div>

        <div class="d-flex justify-content-end mb-4 pt-1">
            <a href="myReports.html" class="btn btn-outline-primary rounded-pill fw-bold py-1 px-3 shadow-sm d-flex align-items-center gap-1" style="font-size: 0.85rem; border-width: 2px;">
                <span class="material-symbols-rounded" style="font-size: 16px;">receipt_long</span>
                Check Status
            </a>
        </div>
        
        <form id="lostFoundForm">
            <!-- Type Selector -->
            <div class="d-flex justify-content-between mb-4 mt-2">
                <input type="radio" class="btn-check" name="itemType" id="btn-lost" value="lost" checked onchange="updateLabels()">
                <label class="btn btn-custom-toggle rounded-pill py-2" for="btn-lost" style="width: 45%;">Lost</label>
 
                <input type="radio" class="btn-check" name="itemType" id="btn-found" value="found" onchange="updateLabels()">
                <label class="btn btn-custom-toggle rounded-pill py-2" for="btn-found" style="width: 45%;">Found</label>
            </div>
 
            <!-- Description -->
            <div class="mb-3 text-start">
                <label for="itemDescription" id="descLabel" class="form-label fw-bold text-primary" style="font-size: 0.95rem;">Describe the item you lost?</label>
                <textarea class="form-control rounded-4 custom-form-border" id="itemDescription" name="description" rows="5" required></textarea>
            </div>
 
            <!-- Image Upload -->
            <div class="mb-3 text-start">
                <label class="form-label fw-bold text-primary" style="font-size: 0.95rem;">Upload Item Photo</label>
                <div class="rounded-4 custom-form-border d-flex align-items-center justify-content-center flex-column bg-white shadow-sm overflow-hidden" 
                     id="photoUploadArea"
                     style="height: 120px; cursor: pointer; position: relative;">
                     
                    <span class="material-symbols-rounded text-primary mb-1" style="font-size: 3.5rem;">add_a_photo</span>
                    <small class="text-muted mt-1 fw-semibold" id="fileCountText">Up to 2 photos</small>
                </div>
                <div class="text-center mt-3">
                    <button type="button" id="clearPhotosBtn" class="btn btn-outline-primary rounded-pill px-4 shadow-sm fw-bold" style="display: none; font-size: 0.85rem; border-width: 2px;">Clear Photos</button>
                </div>
                <input type="file" id="imageUpload" name="images[]" accept="image/*" multiple class="d-none">
            </div>
 
            <!-- Bus Number -->
            <div class="mb-5 text-start">
                <label for="busNumber" id="busLabel" class="form-label fw-bold text-primary" style="font-size: 0.95rem;">Last Bus lost (optional)</label>
                <input type="text" class="form-control rounded-pill custom-form-border px-3 py-2" id="busNumber" name="bus_number">
            </div>
 
            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary rounded-pill fw-bold shadow mt-2" style="padding: 10px 50px;">Save Report</button>
        </form>
    </div>
 
    <!-- UI Logic Script -->
    <script>
        const SERVER_URL = localStorage.getItem('byahero_server_url') || 'https://byahero.app';

        function updateLabels() {
            const isLost = document.getElementById('btn-lost').checked;
            const descLabel = document.getElementById('descLabel');
            const busLabel = document.getElementById('busLabel');
            
            if (isLost) {
                descLabel.innerText = "Describe the item you lost?";
                busLabel.innerText = "Last Bus lost (optional)";
            } else {
                descLabel.innerText = "Describe the item you found?";
                busLabel.innerText = "Last Bus found (optional)";
            }
        }
 
        const dt = new DataTransfer();
        const input = document.getElementById('imageUpload');
        const fileCountText = document.getElementById('fileCountText');
        const clearBtn = document.getElementById('clearPhotosBtn');
        const photoArea = document.getElementById('photoUploadArea');

        photoArea.addEventListener('click', () => input.click());

        input.addEventListener('change', () => {
            if (input.files && input.files.length > 0) {
                for (let i = 0; i < input.files.length; i++) {
                    if (dt.items.length < 2) {
                        dt.items.add(input.files[i]);
                    } else {
                        alert("You can only upload a maximum of 2 photos.");
                        break;
                    }
                }
            }
            input.files = dt.files;
            updateUI();
        });

        clearBtn.addEventListener('click', (e) => {
            e.preventDefault();
            dt.items.clear();
            input.files = dt.files;
            updateUI();
        });

        function updateUI() {
            let numFiles = input.files.length;
            if (numFiles > 0) {
                fileCountText.innerText = numFiles + (numFiles === 1 ? " photo selected" : " photos selected");
                fileCountText.classList.remove('text-muted');
                fileCountText.style.color = "#198754"; // success green
                clearBtn.style.display = 'inline-block';
            } else {
                fileCountText.innerText = "Up to 2 photos";
                fileCountText.classList.add('text-muted');
                fileCountText.style.color = "";
                clearBtn.style.display = 'none';
            }
        }

        // Form Submit Handler
        const form = document.getElementById('lostFoundForm');
        const notice = document.getElementById('submitNotice');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            notice.classList.add('d-none');
            notice.textContent = '';

            const itemType = document.querySelector('input[name="itemType"]:checked').value;
            const description = document.getElementById('itemDescription').value.trim();
            const busNumber = document.getElementById('busNumber').value.trim();

            const reportData = {
                type: itemType,
                description: description,
                bus_number: busNumber,
                timestamp: Date.now()
            };

            // Offline Flow: Queue report
            if (navigator.onLine === false) {
                const pending = JSON.parse(localStorage.getItem('byahero_pending_lost_found') || '[]');
                pending.push(reportData);
                localStorage.setItem('byahero_pending_lost_found', JSON.stringify(pending));

                notice.textContent = "Report saved locally! It will automatically sync to the server when you go online.";
                notice.className = "alert alert-success border-0 rounded-4 shadow-sm mb-3";
                notice.classList.remove('d-none');
                
                form.reset();
                dt.items.clear();
                input.files = dt.files;
                updateUI();
                return;
            }

            // Online Flow: Submit to Server API
            const formData = new FormData();
            formData.append('itemType', itemType);
            formData.append('description', description);
            formData.append('bus_number', busNumber);
            
            // Append files
            for (let i = 0; i < input.files.length; i++) {
                formData.append('images[]', input.files[i]);
            }

            try {
                const res = await fetch(SERVER_URL + '/public/passenger/lostAndFound/lostAndFoundDone.php', {
                    method: 'POST',
                    body: formData
                });
                
                if (res.ok) {
                    notice.textContent = "Report successfully submitted to the server!";
                    notice.className = "alert alert-success border-0 rounded-4 shadow-sm mb-3";
                    notice.classList.remove('d-none');
                    form.reset();
                    dt.items.clear();
                    input.files = dt.files;
                    updateUI();
                } else {
                    throw new Error("Server responded with error status");
                }
            } catch (err) {
                console.error(err);
                
                // On request crash, save locally as fallback
                const pending = JSON.parse(localStorage.getItem('byahero_pending_lost_found') || '[]');
                pending.push(reportData);
                localStorage.setItem('byahero_pending_lost_found', JSON.stringify(pending));

                notice.textContent = "Network error. Report saved locally and queued for synchronization.";
                notice.className = "alert alert-warning border-0 rounded-4 shadow-sm mb-3";
                notice.classList.remove('d-none');
                
                form.reset();
                dt.items.clear();
                input.files = dt.files;
                updateUI();
            }
        });
    </script>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
