<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <link rel="icon" href="../../images/byaheroLogoBlue.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Share My Location - ByaHero</title>

  <link rel="stylesheet" href="../../css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background-color: #f8f9fa;
      padding-top: 54px;
      padding-bottom: 20px;
    }

    .passenger-topbar-sticky {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      width: 100%;
      z-index: 2002 !important;
    }

    .hover-bg-white-10:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body>
  <!-- Header Top Bar Component -->
  <div class="bg-primary d-flex align-items-center justify-content-between rounded-bottom-4 px-3 shadow-sm position-absolute top-0 start-0 z-3 w-100 passenger-topbar-sticky" style="height: 40px;">
    <div class="d-flex align-items-center">
      <a href="../index.html" class="text-white text-decoration-none d-flex align-items-center p-1 rounded-circle hover-bg-white-10">
        <span class="material-symbols-rounded text-white" style="font-size: 24px;">arrow_back</span>
      </a>
      <h6 class="h5 mb-0 text-white fw-normal ms-2" style="font-size: 1.1rem;">Share Location</h6>
    </div>
  </div>

  <div class="container text-center mt-5 pt-3">
    <div class="fw-bold text-primary mt-1" style="font-size: 1.5rem;">Share My Location</div>
    <p class="small text-secondary mx-auto mb-4" style="font-size: 1rem; line-height: 1.5; max-width: 500px;">
      Turn on Share Location to appear live in your Circle. If it’s off, friends will see “Last seen…”.
    </p>

    <div class="mb-4">
      <span id="share-status" class="badge rounded-pill py-2 px-3 bg-secondary text-white">Checking…</span>
    </div>

    <!-- Guest Warning -->
    <div id="guestWarning" class="alert alert-warning small py-2 d-none mb-4 mx-auto" style="max-width: 400px;">
      ⚠️ Location sharing is only available to registered logged-in users.
    </div>

    <div class="d-flex flex-grow-1 flex-column gap-2 align-items-center">
      <button id="btnOn1" class="btn btn-primary w-100 py-3 d-flex align-items-center justify-content-center mb-2" onclick="enableShareLocation()" style="border-radius: 10px; max-width: 400px; background-color: #1e3a8a; border-color: #1e3a8a;">
        <span class="material-symbols-rounded me-2" style="font-size: 1.5rem;">my_location</span> Turn ON Share Location
      </button>

      <button id="btnOn2" class="btn btn-outline-primary w-100 py-3 d-flex align-items-center justify-content-center mb-2" onclick="enableShareLocation()" style="border-radius: 10px; max-width: 400px; background-color: white; border-color: #1e3a8a; color: #1e3a8a;">
        <span class="material-symbols-rounded me-2" style="font-size: 1.5rem;">location_on</span> Turn ON (then select on map later)
      </button>

      <button id="btnOff" class="btn btn-danger w-100 py-3 d-flex align-items-center justify-content-center mb-2" onclick="disableShareLocation()" style="border-radius: 10px; max-width: 400px;">
        <span class="material-symbols-rounded me-2" style="font-size: 1.5rem;">cancel</span> Turn OFF Share Location
      </button>
    </div>
  </div>

  <script src="../../js/bootstrap.bundle.min.js"></script>

  <script>
    const email = localStorage.getItem('byahero_cached_email') || 'Guest';
    const isLoggedIn = email !== 'Guest' && email !== 'guest@byahero.app';
    const SERVER_URL = localStorage.getItem('byahero_server_url') || 'https://byahero.app';

    async function postSetting(setting_name, setting_value) {
      const fd = new FormData();
      fd.append('setting_name', setting_name);
      fd.append('setting_value', String(setting_value));

      const res = await fetch(SERVER_URL + '/backend/updateSettings.php', {
        method: 'POST',
        body: fd,
        credentials: 'include'
      });
      return res.json();
    }

    async function refreshStatus() {
      const el = document.getElementById('share-status');
      
      // Guest fallback
      if (!isLoggedIn) {
        document.getElementById('guestWarning').classList.remove('d-none');
        document.getElementById('btnOn1').disabled = true;
        document.getElementById('btnOn2').disabled = true;
        document.getElementById('btnOff').disabled = true;
        el.textContent = 'Share Location: OFF';
        el.className = 'badge rounded-pill py-2 px-3 bg-secondary text-white';
        return;
      }

      // Offline fallback
      if (!navigator.onLine) {
        const localStatus = localStorage.getItem('byahero_share_location') === '1';
        el.textContent = localStatus ? 'Share Location: ON (Offline)' : 'Share Location: OFF (Offline)';
        el.className = 'badge rounded-pill py-2 px-3 ' + (localStatus ? 'bg-success text-white' : 'bg-secondary text-white');
        return;
      }

      try {
        const res = await fetch(SERVER_URL + '/backend/getShareLocationSetting.php', { credentials: 'include', cache: 'no-store' });
        const data = await res.json();
        const on = data && data.success && parseInt(data.share_location) === 1;

        localStorage.setItem('byahero_share_location', on ? '1' : '0');
        el.textContent = on ? 'Share Location: ON' : 'Share Location: OFF';
        el.className = 'badge rounded-pill py-2 px-3 ' + (on ? 'bg-success text-white' : 'bg-secondary text-white');
      } catch (e) {
        const localStatus = localStorage.getItem('byahero_share_location') === '1';
        el.textContent = localStatus ? 'Share Location: ON (Cached)' : 'Share Location: OFF (Cached)';
        el.className = 'badge rounded-pill py-2 px-3 ' + (localStatus ? 'bg-success text-white' : 'bg-secondary text-white');
      }
    }

    async function enableShareLocation() {
      if (!isLoggedIn) return;

      localStorage.setItem('byahero_share_location', '1');
      if (navigator.onLine) {
        try {
          const r = await postSetting('share_location', 1);
          if (!r.success) {
            alert(r.message || 'Failed to enable Share Location');
            return;
          }
          alert('Share Location is ON. Open Circle to appear live.');
        } catch (e) {
          alert('Saved locally. Will sync when server is reachable.');
        }
      } else {
        alert('Saved locally (offline). Will sync when connection is restored.');
      }
      refreshStatus();
    }

    async function disableShareLocation() {
      if (!isLoggedIn) return;

      localStorage.setItem('byahero_share_location', '0');
      if (navigator.onLine) {
        try {
          const r = await postSetting('share_location', 0);
          if (!r.success) {
            alert(r.message || 'Failed to disable Share Location');
            return;
          }
          alert('Share Location is OFF.');
        } catch (e) {
          alert('Saved locally. Will sync when server is reachable.');
        }
      } else {
        alert('Saved locally (offline). Will sync when connection is restored.');
      }
      refreshStatus();
    }

    document.addEventListener('DOMContentLoaded', refreshStatus);
  </script>
</body>

</html>
