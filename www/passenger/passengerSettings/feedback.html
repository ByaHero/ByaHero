<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <link rel="icon" href="../../images/byaheroLogoBlue.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Feedback - ByaHero</title>
  
  <link rel="stylesheet" href="../../css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
      padding-top: 54px;
      padding-bottom: 80px;
      min-height: 100vh;
    }
    
    .passenger-topbar-sticky {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      width: 100%;
      z-index: 2002 !important;
    }

    .hover-bg-white-10:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .star {
      width: clamp(40px, 12vw, 55px);
      height: clamp(40px, 12vw, 55px);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
    }
    .star:hover {
      transform: scale(1.2) translateY(-5px);
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.1));
    }
    .star:active {
      transform: scale(0.9);
    }
    .feedback-textarea:focus {
      border-color: #1e3a8a !important;
      background-color: #ffffff !important;
      outline: none;
      box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1) !important;
    }
    .btn-primary-custom {
      background-color: #1e3a8a !important;
      border-color: #1e3a8a !important;
    }
    .btn-primary-custom:hover:not(:disabled) {
      background-color: #172554 !important;
      border-color: #172554 !important;
      transform: translateY(-2px);
    }
    .btn-secondary-custom:hover {
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <!-- Header Top Bar Component -->
  <div class="bg-primary d-flex align-items-center justify-content-between rounded-bottom-4 px-3 shadow-sm position-absolute top-0 start-0 z-3 w-100 passenger-topbar-sticky" style="height: 40px;">
    <div class="d-flex align-items-center">
      <a href="../index.html" class="text-white text-decoration-none d-flex align-items-center p-1 rounded-circle hover-bg-white-10">
        <span class="material-symbols-rounded text-white" style="font-size: 24px;">arrow_back</span>
      </a>
      <h6 class="h5 mb-0 text-white fw-normal ms-2" style="font-size: 1.1rem;">Feedback</h6>
    </div>
  </div>

  <div class="container mt-5 pt-3" style="max-width: 600px;">
    <div class="bg-white border-0 p-4 p-sm-5 shadow-sm" style="border-radius: 24px; box-shadow: 0 12px 36px rgba(0, 0, 0, 0.06) !important;">
      <div class="text-center mb-4">
        <h5 class="fw-bold text-primary mb-2" style="font-size: 1.75rem; letter-spacing: -0.5px;">Help us improve!</h5>
        <p class="text-secondary" style="font-size: 1.05rem;">How would you rate your experience with ByaHero?</p>
      </div>

      <div class="alert alert-warning d-flex align-items-center gap-3 p-3 mb-4 border-start border-4 border-warning rounded-3 d-none" id="loginWarning">
        <span class="material-symbols-rounded text-warning">info</span>
        <span style="color: #92400e;">Please <a href="../../login.html" style="color: #d97706; text-decoration: underline; font-weight: bold;">login</a> to submit feedback.</span>
      </div>

      <div id="feedbackFormContent">
        <div class="d-flex justify-content-center gap-2 gap-sm-4 p-4 mb-4 bg-light rounded-4" style="border-radius: 16px !important;">
          <img src="../../images/star_blank.svg" class="star" data-value="1" alt="1 star">
          <img src="../../images/star_blank.svg" class="star" data-value="2" alt="2 stars">
          <img src="../../images/star_blank.svg" class="star" data-value="3" alt="3 stars">
          <img src="../../images/star_blank.svg" class="star" data-value="4" alt="4 stars">
          <img src="../../images/star_blank.svg" class="star" data-value="5" alt="5 stars">
        </div>

        <div class="mb-3">
          <label for="feedbackTextarea" class="mb-3 d-block fw-semibold text-secondary" style="font-size: 0.95rem;">Additional Information (What would you like to say?)</label>
          <textarea id="feedbackTextarea" class="form-control border p-3 feedback-textarea" placeholder="Share your thoughts, suggestions, or report issues..." style="height: 140px; resize: vertical; border-radius: 12px; background-color: #f8fafc; font-size: 1rem; color: #1e293b;"></textarea>
        </div>

        <div class="mt-4 pt-2 d-flex justify-content-center gap-3">
          <button class="btn btn-light border rounded-pill fw-semibold py-2 px-4 btn-secondary-custom" onclick="location.href = '../index.html';" style="font-size: 1rem; transition: all 0.2s ease; border-radius: 50rem;">Cancel</button>
          <button class="btn btn-primary rounded-pill fw-semibold py-2 px-4 btn-primary-custom" id="submitBtn" onclick="submitFeedback()" style="font-size: 1rem; transition: all 0.2s ease; border-radius: 50rem;" disabled>Submit Feedback</button>
        </div>
      </div>

      <div id="successMessage" style="display: none;" class="text-center py-4">
        <span class="material-symbols-rounded" style="font-size: 4rem; color: #10b981;">check_circle</span>
        <h4 class="mt-3 fw-bold" style="color: #1e3a8a;">Feedback Sent!</h4>
        <p class="text-muted" id="successText">Thank you for helping us improve ByaHero.</p>
        <p class="text-muted small mt-4">Redirecting you home...</p>
      </div>
    </div>
  </div>

  <script src="../../js/bootstrap.bundle.min.js"></script>
  <script>
    const SERVER_URL = localStorage.getItem('byahero_server_url') || 'https://byahero.alwaysdata.net';
    const email = localStorage.getItem('byahero_cached_email');
    const isLoggedIn = !!email;

    let selectedRating = null;
    const blankStarUrl = '../../images/star_blank.svg';
    const fullStarUrl = '../../images/star_full.svg';
    const stars = document.querySelectorAll('.star');

    // Toggle login warning if guest
    if (!isLoggedIn) {
      document.getElementById('loginWarning').classList.remove('d-none');
      document.getElementById('feedbackTextarea').disabled = true;
    }

    stars.forEach(star => {
      star.addEventListener('mouseover', function() {
        if (!isLoggedIn) return;
        const val = parseInt(this.getAttribute('data-value'));
        updateStars(val, true);
      });
      
      star.addEventListener('mouseout', function() {
        if (!isLoggedIn) return;
        updateStars(selectedRating ? parseInt(selectedRating) : 0, false);
      });
      
      star.addEventListener('click', function() {
        if (!isLoggedIn) {
          alert("Please login to submit feedback.");
          location.href = "../../login.html";
          return;
        }
        selectedRating = this.getAttribute('data-value');
        updateStars(parseInt(selectedRating), false);
        
        // Enable submit button
        const submitBtn = document.getElementById('submitBtn');
        if (submitBtn && isLoggedIn) {
          submitBtn.disabled = false;
        }
      });
    });

    function updateStars(value, isHover) {
      stars.forEach(s => {
        const starVal = parseInt(s.getAttribute('data-value'));
        if (starVal <= value) {
          s.src = fullStarUrl;
          if (isHover) s.style.transform = 'scale(1.15)';
          else s.style.transform = 'scale(1)';
        } else {
          s.src = blankStarUrl;
          s.style.transform = 'scale(1)';
        }
      });
    }

    function submitFeedback() {
      if (!isLoggedIn) {
        alert("Please login to submit feedback.");
        location.href = "../../login.html";
        return;
      }

      const feedbackText = document.getElementById("feedbackTextarea").value;

      if (!selectedRating || parseInt(selectedRating) < 1) {
        alert("Please select at least 1 star before submitting.");
        return;
      }

      const submitBtn = document.getElementById('submitBtn');
      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = 'Submitting...';
      }

      // If offline, queue feedback locally
      if (navigator.onLine === false) {
        queueFeedbackOffline(selectedRating, feedbackText);
        return;
      }

      const formData = new FormData();
      formData.append('rating', selectedRating);
      formData.append('feedback', feedbackText.trim());

      fetch(SERVER_URL + '/backend/submitFeedback.php', {
        method: 'POST',
        body: formData
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          showSuccess("Thank you for helping us improve ByaHero.");
        } else {
          alert("Failed to submit feedback: " + data.message + ". Saving offline...");
          queueFeedbackOffline(selectedRating, feedbackText);
        }
      })
      .catch(error => {
        console.error('Error submitting online:', error);
        queueFeedbackOffline(selectedRating, feedbackText);
      });
    }

    function queueFeedbackOffline(rating, text) {
      const queue = JSON.parse(localStorage.getItem('byahero_pending_feedback') || '[]');
      queue.push({
        rating: rating,
        feedback: text.trim(),
        timestamp: Date.now()
      });
      localStorage.setItem('byahero_pending_feedback', JSON.stringify(queue));

      showSuccess("Feedback saved locally (offline). It will sync once internet returns.");
    }

    function showSuccess(messageText) {
      document.getElementById('successText').textContent = messageText;
      document.getElementById('feedbackFormContent').style.display = 'none';
      document.getElementById('successMessage').style.display = 'block';
      setTimeout(() => {
        location.href = "../index.html";
      }, 2000);
    }

    // Sync manager on page load
    window.addEventListener('DOMContentLoaded', () => {
      if (navigator.onLine && isLoggedIn) {
        syncPendingFeedback();
      }
    });

    async function syncPendingFeedback() {
      const queue = JSON.parse(localStorage.getItem('byahero_pending_feedback') || '[]');
      if (queue.length === 0) return;

      const remaining = [];
      for (const item of queue) {
        const formData = new FormData();
        formData.append('rating', item.rating);
        formData.append('feedback', item.feedback);

        try {
          const res = await fetch(SERVER_URL + '/backend/submitFeedback.php', {
            method: 'POST',
            body: formData
          });
          const resJson = await res.json();
          if (!resJson || !resJson.success) {
            remaining.push(item);
          }
        } catch (err) {
          console.error('Failed to sync feedback item:', err);
          remaining.push(item);
        }
      }

      if (remaining.length > 0) {
        localStorage.setItem('byahero_pending_feedback', JSON.stringify(remaining));
      } else {
        localStorage.removeItem('byahero_pending_feedback');
        console.log("All pending feedback successfully synced.");
      }
    }
  </script>
</body>

</html>
