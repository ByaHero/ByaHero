<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../../images/byaheroLogoBlue.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report a Problem - ByaHero</title>
    
    <link href="../../css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" rel="stylesheet" />
    
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
            padding-top: 54px;
            padding-bottom: 80px;
        }

        .passenger-topbar-sticky {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            width: 100%;
            z-index: 2002 !important;
        }

        .hover-bg-white-10:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        /* Custom Radio Buttons */
        .custom-radio-input {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 1px solid #0f172a;
            border-radius: 50%;
            margin: 0;
            cursor: pointer;
            position: relative;
            outline: none;
            background-color: transparent;
        }
        .custom-radio-input:checked {
            border-width: 6px;
            border-color: #1e3a8a;
        }

        .custom-textarea:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(30, 58, 138, 0.2) !important;
        }

        .btn-submit-hover:hover {
            background-color: #152c6b !important;
            border-color: #152c6b !important;
        }
    </style>
</head>
<body>
    <!-- Header Top Bar Component -->
    <div class="bg-primary d-flex align-items-center justify-content-between rounded-bottom-4 px-3 shadow-sm position-absolute top-0 start-0 z-3 w-100 passenger-topbar-sticky" style="height: 40px;">
        <div class="d-flex align-items-center">
            <a href="../index.html" class="text-white text-decoration-none d-flex align-items-center p-1 rounded-circle hover-bg-white-10">
                <span class="material-symbols-rounded text-white" style="font-size: 24px;">arrow_back</span>
            </a>
            <h6 class="h5 mb-0 text-white fw-normal ms-2" style="font-size: 1.1rem;">Report a Problem</h6>
        </div>
    </div>

    <div class="container mt-4 pt-4 pb-5 mb-5 px-3">
        
        <!-- Main Header Card -->
        <div class="d-flex align-items-start gap-3 mb-4 mt-3 px-2">
            <div class="d-flex align-items-center justify-content-center rounded-circle flex-shrink-0 mt-1" style="width: 45px; height: 45px; background-color: #0c2b5e;">
                <img src="../../images/report.svg" alt="Report Icon" style="width: 24px; height: 24px; filter: brightness(0) invert(1);">
            </div>
            <div>
                <h4 class="fw-bold text-dark text-start mb-1" style="font-size: 1.15rem;">Report a Problem</h4>
                <p class="small text-secondary text-start mb-0" style="font-size: 0.85rem; line-height: 1.3;">Submit a report if you encountered any issues during your trip so we can take appropriate action.</p>
            </div>
        </div>

        <div class="alert alert-success alert-dismissible fade show d-none" role="alert" id="successAlert">
            <strong>Success!</strong> <span id="successAlertText">Your report has been submitted.</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="alert alert-danger alert-dismissible fade show d-none" role="alert" id="errorAlert">
            <strong>Error:</strong> <span id="errorAlertText">An error occurred.</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Form Card -->
        <div class="bg-light border-0 p-4" style="border-radius: 20px;">
            <form id="reportProblemForm" onsubmit="handleReportSubmit(event)">
                
                <div class="mb-4">
                    <label class="d-block small fw-bold text-dark text-start mb-2" for="busNumberInput" style="font-size: 0.85rem;">Bus Number:</label>
                    <div id="busSelectorContainer">
                        <!-- Will be populated dynamically based on query parameter or cache -->
                        <select class="form-select border p-3" id="busNumberInput" name="bus_number" required style="border-radius: 12px; font-size: 0.9rem;">
                            <option value="" disabled selected>Select a bus</option>
                        </select>
                        <div class="form-text small" style="margin-top: 4px; color: #64748b;">Please select the bus number you want to report.</div>
                    </div>
                </div>
                
                <div class="d-flex flex-column gap-3 mb-4">
                    <div class="d-flex align-items-center justify-content-between">
                        <label class="small fw-bold text-dark m-0 cursor-pointer text-start" for="reason1" style="font-size: 0.85rem; width: 85%; line-height: 1.3;">No Air Conditioning / Poor Ventilation in Bus</label>
                        <input type="radio" id="reason1" name="report_reason" value="No Air Conditioning" class="custom-radio-input" required>
                    </div>
                    
                    <div class="d-flex align-items-center justify-content-between">
                        <label class="small fw-bold text-dark m-0 cursor-pointer text-start" for="reason2" style="font-size: 0.85rem; width: 85%; line-height: 1.3;">Dirty or Unclean Bus</label>
                        <input type="radio" id="reason2" name="report_reason" value="Dirty or Unclean Bus" class="custom-radio-input">
                    </div>
                    
                    <div class="d-flex align-items-center justify-content-between">
                        <label class="small fw-bold text-dark m-0 cursor-pointer text-start" for="reason3" style="font-size: 0.85rem; width: 85%; line-height: 1.3;">Broken Seats or Unsafe Interior</label>
                        <input type="radio" id="reason3" name="report_reason" value="Broken Seats or Unsafe Interior" class="custom-radio-input">
                    </div>
                    
                    <div class="d-flex align-items-center justify-content-between">
                        <label class="small fw-bold text-dark m-0 cursor-pointer text-start" for="reason4" style="font-size: 0.85rem; width: 85%; line-height: 1.3;">Reckless Driving</label>
                        <input type="radio" id="reason4" name="report_reason" value="Reckless Driving" class="custom-radio-input">
                    </div>
                    
                    <div class="d-flex align-items-center justify-content-between">
                        <label class="small fw-bold text-dark m-0 cursor-pointer text-start" for="reason5" style="font-size: 0.85rem; width: 85%; line-height: 1.3;">Over-speeding / Sudden Braking</label>
                        <input type="radio" id="reason5" name="report_reason" value="Over-speeding / Sudden Braking" class="custom-radio-input">
                    </div>
                    
                    <div class="d-flex align-items-center justify-content-between">
                        <label class="small fw-bold text-dark m-0 cursor-pointer text-start" for="reason6" style="font-size: 0.85rem; width: 85%; line-height: 1.3;">Unprofessional Behavior of Driver or Conductor</label>
                        <input type="radio" id="reason6" name="report_reason" value="Unprofessional Behavior" class="custom-radio-input">
                    </div>
                    
                    <div class="d-flex align-items-center justify-content-between">
                        <label class="small fw-bold text-dark m-0 cursor-pointer text-start" for="reason7" style="font-size: 0.85rem; width: 85%; line-height: 1.3;">Discount Not Applied (Senior / PWD / Student)</label>
                        <input type="radio" id="reason7" name="report_reason" value="Discount Not Applied" class="custom-radio-input">
                    </div>
                    
                    <div class="d-flex align-items-center justify-content-between">
                        <label class="small fw-bold text-dark m-0 cursor-pointer text-start" for="reason8" style="font-size: 0.85rem; width: 85%; line-height: 1.3;">No Receipt</label>
                        <input type="radio" id="reason8" name="report_reason" value="No Receipt" class="custom-radio-input">
                    </div>
                    
                    <div class="d-flex align-items-center justify-content-between">
                        <label class="small fw-bold text-dark m-0 cursor-pointer text-start" for="reason9" style="font-size: 0.85rem; width: 85%; line-height: 1.3;">Line Cutting</label>
                        <input type="radio" id="reason9" name="report_reason" value="Line Cutting" class="custom-radio-input">
                    </div>
                </div>

                <div class="mt-4 mb-3">
                    <label class="d-block small fw-bold text-dark text-start mb-2" for="contactNumber" style="font-size: 0.85rem;">Contact Number (Optional):</label>
                    <input type="tel" class="form-control" id="contactNumber" name="contact_number" placeholder="e.g. 09123456789" style="border-radius: 12px; padding: 12px;" maxlength="11" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                </div>

                <div class="mt-3">
                    <label class="d-block small fw-bold text-dark text-start mb-2" for="othersTextarea" style="font-size: 0.85rem;">Others (please specify):</label>
                    <textarea class="form-control border-0 p-3 custom-textarea" id="othersTextarea" name="others_details" style="border-radius: 20px; min-height: 160px; resize: none; font-size: 0.9rem; background-color: #ffffff;"></textarea>
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary rounded-pill fw-bold py-2 btn-submit-hover" id="submitBtn" style="width: 130px; background-color: #1e3a8a; border-color: #1e3a8a; font-size: 0.9rem; transition: all 0.2s;">Submit</button>
                </div>
            </form>
        </div>

    </div>

    <!-- Bootstrap Bundle -->
    <script src="../../js/bootstrap.bundle.min.js"></script>

    <script>
        const SERVER_URL = localStorage.getItem('byahero_server_url') || 'https://byahero.app';
        const email = localStorage.getItem('byahero_cached_email');
        const isLoggedIn = !!email;

        // Check for URL query parameter "bus_number"
        const urlParams = new URLSearchParams(window.location.search);
        const busNumberParam = urlParams.get('bus_number');

        window.addEventListener('DOMContentLoaded', () => {
            initializeBusSelector();
            
            // Sync queue if online
            if (navigator.onLine && isLoggedIn) {
                syncPendingReports();
            }
        });

        async function initializeBusSelector() {
            const container = document.getElementById('busSelectorContainer');
            
            if (busNumberParam) {
                container.innerHTML = `
                    <input type="text" class="form-control" id="busNumberInput" name="bus_number" value="${escapeHTML(busNumberParam)}" readonly style="border-radius: 12px; padding: 12px; background-color: #e2e8f0; cursor: not-allowed;">
                    <div class="form-text small" style="margin-top: 4px; color: #64748b;">Selected from your <strong>Ride History</strong>.</div>
                `;
                return;
            }

            // Populate selector dynamically
            const selectEl = document.getElementById('busNumberInput');
            let buses = [];

            // Load from server if online, otherwise from cache
            if (navigator.onLine) {
                try {
                    const res = await fetch(SERVER_URL + '/api.php?action=get_buses');
                    const data = await res.json();
                    if (data && data.buses) {
                        buses = data.buses;
                        localStorage.setItem('byahero_cached_buses', JSON.stringify(buses));
                    }
                } catch (err) {
                    console.error("Failed to load buses from server:", err);
                    buses = JSON.parse(localStorage.getItem('byahero_cached_buses') || '[]');
                }
            } else {
                buses = JSON.parse(localStorage.getItem('byahero_cached_buses') || '[]');
            }

            // Fallback default list if empty
            if (buses.length === 0) {
                buses = [
                    { code: 'BUS-001' }, { code: 'BUS-002' }, { code: 'BUS-003' },
                    { code: 'BUS-004' }, { code: 'BUS-005' }, { code: 'BUS-006' },
                    { code: 'BUS-007' }, { code: 'BUS-008' }, { code: 'BUS-009' },
                    { code: 'BUS-010' }
                ];
            }

            buses.forEach(bus => {
                const opt = document.createElement('option');
                opt.value = bus.code;
                opt.textContent = bus.code;
                selectEl.appendChild(opt);
            });
        }

        async function handleReportSubmit(e) {
            e.preventDefault();

            const successAlert = document.getElementById('successAlert');
            const errorAlert = document.getElementById('errorAlert');
            successAlert.classList.add('d-none');
            errorAlert.classList.add('d-none');

            const busInput = document.getElementById('busNumberInput');
            const busNumber = busInput ? busInput.value : '';
            
            const selectedReasonEl = document.querySelector('input[name="report_reason"]:checked');
            const reportReason = selectedReasonEl ? selectedReasonEl.value : '';
            
            const contactNumber = document.getElementById('contactNumber').value;
            const othersDetails = document.getElementById('othersTextarea').value;

            if (!busNumber) {
                alert("Please select or enter a bus number.");
                return;
            }

            if (!reportReason && !othersDetails) {
                alert("Please select a reason or write details in the Others section.");
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = "Submitting...";

            const payload = {
                bus_number: busNumber,
                report_reason: reportReason || 'Others',
                contact_number: contactNumber,
                others_details: othersDetails
            };

            if (navigator.onLine === false) {
                queueReportOffline(payload);
                return;
            }

            // Online submit
            try {
                const formData = new FormData();
                formData.append('bus_number', payload.bus_number);
                formData.append('report_reason', payload.report_reason);
                formData.append('contact_number', payload.contact_number);
                formData.append('others_details', payload.others_details);

                const res = await fetch(SERVER_URL + '/passenger/report/submitReport.php?json=1', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data && data.success) {
                    showSuccessAlert(data.message || "Your report has been submitted successfully!");
                } else {
                    alert("Failed to submit to server: " + (data.message || "Unknown error") + ". Saving locally instead.");
                    queueReportOffline(payload);
                }
            } catch (err) {
                console.error("Failed to post report to server:", err);
                queueReportOffline(payload);
            }
        }

        function queueReportOffline(payload) {
            const queue = JSON.parse(localStorage.getItem('byahero_pending_reports') || '[]');
            payload.timestamp = Date.now();
            queue.push(payload);
            localStorage.setItem('byahero_pending_reports', JSON.stringify(queue));
            
            showSuccessAlert("Your report has been saved locally (offline) and will sync when you are back online.");
        }

        function showSuccessAlert(msg) {
            const successAlert = document.getElementById('successAlert');
            const successAlertText = document.getElementById('successAlertText');
            successAlertText.textContent = msg;
            successAlert.classList.remove('d-none');
            
            // Disable form inputs
            document.getElementById('reportProblemForm').reset();
            
            setTimeout(() => {
                window.location.href = "../index.html";
            }, 3000);
        }

        async function syncPendingReports() {
            const queue = JSON.parse(localStorage.getItem('byahero_pending_reports') || '[]');
            if (queue.length === 0) return;

            const remaining = [];
            for (const report of queue) {
                try {
                    const formData = new FormData();
                    formData.append('bus_number', report.bus_number);
                    formData.append('report_reason', report.report_reason);
                    formData.append('contact_number', report.contact_number);
                    formData.append('others_details', report.others_details);

                    const res = await fetch(SERVER_URL + '/passenger/report/submitReport.php?json=1', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    if (!data || !data.success) {
                        remaining.push(report);
                    }
                } catch (err) {
                    console.error("Sync error for report:", err);
                    remaining.push(report);
                }
            }

            if (remaining.length > 0) {
                localStorage.setItem('byahero_pending_reports', JSON.stringify(remaining));
            } else {
                localStorage.removeItem('byahero_pending_reports');
                console.log("All pending passenger reports successfully synced.");
            }
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }
    </script>
</body>
</html>
