<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link rel="icon" href="../../assets/images/byaheroLogoBlue.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Bus Information - ByaHero</title>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" rel="stylesheet" />
    <link href="../../css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            padding-top: 54px;
            padding-bottom: 40px;
            background-color: #fff;
        }

        .text-primary { color: #1e3a8a !important; }
        .shadow-sm { box-shadow: none !important; }
        .border { border-color: #e2e8f0 !important; }
        .btn-custom-toggle { border: 1px solid #e2e8f0 !important; }

        .passenger-topbar-sticky {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            width: 100%;
            z-index: 2002 !important;
        }

        .hover-bg-white-10:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        #fareAmount.fare-text {
            font-weight: 900 !important;
            font-size: clamp(3rem, 12vw, 4.5rem) !important;
            line-height: 1 !important;
        }

        .transition-icon {
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .btn-custom-toggle[aria-expanded="true"] {
            background-color: var(--bs-primary-bg-subtle) !important;
            border-color: var(--bs-primary) !important;
            color: var(--bs-primary) !important;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(13, 71, 161, 0.15) !important;
        }

        .btn-custom-toggle[aria-expanded="true"] .transition-icon {
            transform: rotate(180deg);
            color: var(--bs-primary) !important;
        }

        .dropdown-menu-custom {
            max-height: 250px;
            overflow-y: auto;
        }

        .dropdown-item-custom:hover,
        .dropdown-item-custom:focus {
            background-color: #e0f2fe;
            color: #0369a1;
        }
    </style>
</head>

<body class="bg-white">

    <!-- Header Top Bar Component -->
    <div class="bg-primary d-flex align-items-center justify-content-between rounded-bottom-4 px-3 shadow-sm position-absolute top-0 start-0 z-3 w-100 passenger-topbar-sticky" style="height: 40px;">
        <div class="d-flex align-items-center">
            <a href="../index.html" class="text-white text-decoration-none d-flex align-items-center p-1 rounded-circle hover-bg-white-10">
                <span class="material-symbols-rounded text-white" style="font-size: 24px;">arrow_back</span>
            </a>
            <h6 class="h5 mb-0 text-white fw-normal ms-2" style="font-size: 1.1rem;">Bus Information</h6>
        </div>
    </div>

    <div class="container px-4 mt-3">
        <h4 class="text-primary fw-bold mt-4 mb-3 fs-5 ps-1">Bus Operation Schedule</h4>

        <div id="schedulesList">
            <!-- Loaded dynamically from offline_data.js -->
        </div>

        <h4 class="text-primary fw-bold mt-4 mb-3 fs-5 ps-1">Bus Fare Check</h4>

        <div class="row g-2 mb-3">
            <div class="col-6">
                <div class="dropdown w-100">
                    <button
                        class="btn btn-custom-toggle bg-white border border-2 rounded-4 p-3 w-100 text-start d-flex justify-content-between align-items-center text-secondary fw-medium shadow-sm transition-all"
                        type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <span class="selection-text text-truncate" id="pickupText">Pick up</span>
                        <span class="material-symbols-rounded text-secondary transition-icon" style="font-size: 18px;">keyboard_arrow_down</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-custom w-100 border-0 shadow-lg rounded-4 p-2 mt-1" id="pickupDropdownMenu">
                        <!-- Loaded dynamically -->
                    </ul>
                    <input type="hidden" id="pickupLocation" value="">
                </div>
            </div>

            <div class="col-6">
                <div class="dropdown w-100">
                    <button
                        class="btn btn-custom-toggle bg-white border border-2 rounded-4 p-3 w-100 text-start d-flex justify-content-between align-items-center text-secondary fw-medium shadow-sm transition-all"
                        type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <span class="selection-text text-truncate" id="dropoffText">Drop off</span>
                        <span class="material-symbols-rounded text-secondary transition-icon" style="font-size: 18px;">keyboard_arrow_down</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-custom w-100 border-0 shadow-lg rounded-4 p-2 mt-1" id="dropoffDropdownMenu">
                        <!-- Loaded dynamically -->
                    </ul>
                    <input type="hidden" id="dropoffLocation" value="">
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-center mt-2">
            <div class="dropdown">
                <button
                    class="btn btn-custom-toggle bg-white border border-2 rounded-pill py-2 px-4 d-flex align-items-center justify-content-center gap-2 text-secondary fw-medium shadow-sm transition-all"
                    style="min-width: 160px;" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <span class="selection-text" id="discountText">Regular</span>
                    <span class="material-symbols-rounded text-secondary transition-icon" style="font-size: 18px;">keyboard_arrow_down</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-custom border-0 shadow-lg rounded-4 p-2 mt-1 text-center">
                    <li><a class="dropdown-item dropdown-item-custom rounded-3 py-2 px-3 fw-medium text-dark transition-all" href="#" data-value="regular">Regular</a></li>
                    <li><a class="dropdown-item dropdown-item-custom rounded-3 py-2 px-3 fw-medium text-dark transition-all" href="#" data-value="discounted">Student</a></li>
                    <li><a class="dropdown-item dropdown-item-custom rounded-3 py-2 px-3 fw-medium text-dark transition-all" href="#" data-value="discounted">Senior Citizen</a></li>
                    <li><a class="dropdown-item dropdown-item-custom rounded-3 py-2 px-3 fw-medium text-dark transition-all" href="#" data-value="discounted">PWD</a></li>
                </ul>
                <input type="hidden" id="discountType" value="regular">
            </div>
        </div>

        <div id="errorMessage" class="text-danger small text-center mt-3 fw-medium" style="min-height: 20px;"></div>

        <div class="text-primary text-center mt-4 pb-5 d-flex align-items-baseline justify-content-center gap-2">
            <span class="fs-1 fw-bold lh-1" style="font-size: clamp(3rem, 12vw, 4.5rem) !important;">Php</span>
            <span id="fareAmount" class="fare-text fw-bolder">0.00</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../data/offline_data.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const data = window.BYAHERO_OFFLINE_DATA || { stops: [], schedules: [] };
            
            // 1. Render schedules
            const schedulesList = document.getElementById('schedulesList');
            if (data.schedules.length === 0) {
                schedulesList.innerHTML = `<div class="bg-white rounded-4 p-3 mb-3 border shadow-sm text-center text-muted">No schedule posted.</div>`;
            } else {
                schedulesList.innerHTML = data.schedules.map(row => {
                    const formatTime = (timeStr) => {
                        if (!timeStr) return '';
                        const [h, m] = timeStr.split(':');
                        const hr = parseInt(h, 10);
                        const ampm = hr >= 12 ? 'pm' : 'am';
                        const displayHr = hr % 12 || 12;
                        return `${displayHr}:${m} ${ampm}`;
                    };
                    const open = formatTime(row.time_open);
                    const close = formatTime(row.time_close);
                    const timeText = (open && close) ? `${open} - ${close}` : 'Schedule not set';
                    const isSusp = row.is_suspended === 1;

                    return `
                        <div class="bg-white rounded-4 p-3 mb-3 border shadow-sm d-flex justify-content-between align-items-center">
                            <div>
                                <span class="fs-6 text-primary fw-semibold">${row.terminal_name}</span>
                                ${isSusp ? `<div class="small text-danger fw-bold">SUSPENDED${row.suspend_message ? ': ' + row.suspend_message : ''}</div>` : ''}
                            </div>
                            <span class="fw-bold small ${isSusp ? 'text-danger' : 'text-secondary'}">
                                ${isSusp ? 'No Operations' : timeText}
                            </span>
                        </div>
                    `;
                }).join('');
            }

            // 2. Render stops dropdowns
            const pickupMenu = document.getElementById('pickupDropdownMenu');
            const dropoffMenu = document.getElementById('dropoffDropdownMenu');

            const populateStopsDropdown = (menu, targetId) => {
                // Filter stops of type bus_stop or terminal
                const validStops = data.stops.filter(s => s.type === 'bus_stop' || s.type === 'terminal');
                menu.innerHTML = validStops.map(s => `
                    <li>
                        <a class="dropdown-item dropdown-item-custom rounded-3 py-2 px-3 fw-medium text-dark transition-all"
                            href="#"
                            data-target="${targetId}"
                            data-value="${s.id}">
                            ${s.name} (${s.location_name})
                        </a>
                    </li>
                `).join('');
            };

            populateStopsDropdown(pickupMenu, 'pickupLocation');
            populateStopsDropdown(dropoffMenu, 'dropoffLocation');

            // 3. Attach click event to all dropdown items
            document.body.addEventListener('click', (e) => {
                const item = e.target.closest('.dropdown-item');
                if (!item) return;
                e.preventDefault();

                const dropdown = item.closest('.dropdown');
                const btnText = dropdown.querySelector('.selection-text');
                const hiddenInput = dropdown.querySelector('input[type="hidden"]');
                const btn = dropdown.querySelector('.btn-custom-toggle');

                const val = item.getAttribute('data-value');
                hiddenInput.value = val;
                btnText.textContent = item.textContent.trim();

                if (btn) {
                    btn.classList.remove('text-secondary');
                    btn.classList.add('text-dark');
                }

                calculateFare();
            });

            const fareDisplay = document.getElementById('fareAmount');
            const errorMessage = document.getElementById('errorMessage');

            function calculateFare() {
                const pickupId = parseInt(document.getElementById('pickupLocation').value, 10);
                const dropoffId = parseInt(document.getElementById('dropoffLocation').value, 10);
                const fareType = document.getElementById('discountType').value;

                errorMessage.textContent = '';

                if (isNaN(pickupId) || isNaN(dropoffId)) {
                    fareDisplay.textContent = '0.00';
                    return;
                }

                if (pickupId === dropoffId) {
                    errorMessage.textContent = 'Pick-up and drop-off cannot be the same';
                    fareDisplay.textContent = '0.00';
                    return;
                }

                const pickupStop = data.stops.find(s => s.id === pickupId);
                const dropoffStop = data.stops.find(s => s.id === dropoffId);

                if (!pickupStop || !dropoffStop) {
                    errorMessage.textContent = 'Invalid stops selected';
                    fareDisplay.textContent = '0.00';
                    return;
                }

                // Calculate KM distance
                const distance = Math.abs(parseFloat(pickupStop.km_marker) - parseFloat(dropoffStop.km_marker));

                // Apply standard utility bus fare formula
                let regularFare = 0;
                let discountedFare = 0;

                if (distance <= 4) {
                    regularFare = 14.00;
                    discountedFare = 11.25;
                } else {
                    // 14.00 base + 2.25 per km beyond the 4km mark
                    // (Matches live getFare.php distance logic)
                    regularFare = 14.00 + ((distance - 1) * 2.25);
                    discountedFare = regularFare * 0.80;

                    // Round to nearest 0.25
                    regularFare = Math.round(regularFare * 4) / 4;
                    discountedFare = Math.round(discountedFare * 4) / 4;
                }

                const fare = (fareType === 'discounted') ? discountedFare : regularFare;
                fareDisplay.textContent = fare.toFixed(2);
            }
        });
    </script>
</body>

</html>
