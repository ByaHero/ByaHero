<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../assets/images/byaheroLogoBlue.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>No Internet Connection</title>
    <!-- Use Google Fonts if available, fallback to system fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #f0f6fc;
            --accent-color: #0f3878;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --btn-start: #1c4794;
            --btn-end: #0f3878;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Ambient Background Glow */
        .ambient-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(15, 56, 120, 0.4) 0%, rgba(13, 17, 23, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            filter: blur(40px);
            animation: pulse-glow 4s infinite alternate ease-in-out;
        }

        @keyframes pulse-glow {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: slide-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slide-up {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .icon-wrapper {
            margin: 0 auto 24px;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .icon {
            font-size: 36px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(-5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 0.95rem;
            color: rgba(240, 246, 252, 0.7);
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .retry-btn {
            background: linear-gradient(135deg, var(--btn-start), var(--btn-end));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 24px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(15, 56, 120, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .retry-btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(15, 56, 120, 0.3);
        }

        .retry-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        .status-dot {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background-color: #f85149;
            border-radius: 50%;
            border: 2px solid var(--bg-color);
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    
    <div class="container">
        <div class="icon-wrapper">
            <div class="icon">📡</div>
            <div class="status-dot"></div>
        </div>
        
        <h1>No Connection</h1>
        <p>Byahero couldn't connect to the server. Please check your internet connection and try again.</p>
        
        <button class="retry-btn" id="retryButton">
            <svg viewBox="0 0 24 24">
                <path d="M21 2v6h-6"></path>
                <path d="M21 13a9 9 0 1 1-3-7.7L21 8"></path>
            </svg>
            Try Again
        </button>
    </div>

    <script>
        document.getElementById('retryButton').addEventListener('click', () => {
            const btn = document.getElementById('retryButton');
            btn.innerHTML = `
                <svg viewBox="0 0 24 24" style="animation: spin 1s linear infinite;">
                    <path d="M21 2v6h-6"></path>
                    <path d="M21 13a9 9 0 1 1-3-7.7L21 8"></path>
                </svg>
                Connecting...
            `;
            
            // Retry loading the actual app URL
            setTimeout(() => {
                window.location.href = "https://byahero.free.nf";
            }, 600);
        });

        // Add keyframes for inline spinner
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes spin { 100% { transform: rotate(360deg); } }
        `;
        document.head.appendChild(style);
        
        // Auto-reload when online event fires
        window.addEventListener('online', () => {
            window.location.href = "https://byahero.free.nf";
        });
    </script>
</body>
</html>
