<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="../assets/images/byaheroLogoBlue.svg" type="image/svg+xml">
    <script>
      const cachedRole = localStorage.getItem('byahero_cached_role');
      const cachedEmail = localStorage.getItem('byahero_cached_email');

      if (!cachedRole || !cachedEmail) {
        // Not logged in -> Go to login page
        window.location.replace("login.html");
      } else {
        // Logged in -> Route based on connectivity
        if (navigator.onLine === false) {
          if (cachedRole === 'passenger') {
            window.location.replace("passenger/index.html");
          } else if (cachedRole === 'conductor') {
            window.location.replace("conductor/index.html");
          } else {
            window.location.replace("login.html");
          }
        } else {
          // Online -> Go to remote server
          if (cachedRole === 'passenger') {
            window.location.replace("https://byahero.app/public/passenger/index.php");
          } else if (cachedRole === 'conductor') {
            window.location.replace("https://byahero.app/public/conductor/conductor.php");
          } else if (cachedRole === 'admin') {
            window.location.replace("https://byahero.app/public/admin/admin.php");
          } else {
            window.location.replace("https://byahero.app/public/passenger/index.php");
          }
        }
      }
    </script>
    <meta
      http-equiv="refresh"
      content="3; url=login.html"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ByaHero</title>
  </head>
  <body></body>
</html>
