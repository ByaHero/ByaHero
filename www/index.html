<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="../images/byaheroLogoBlue.svg" type="image/svg+xml">
    <script src="capacitor.js"></script>
    <script>
      // Automatically detect and set local developer backend URL if running under localhost/XAMPP
      (function() {
        const loc = window.location;
        const isLocal = loc.hostname === 'localhost' || 
                        loc.hostname === '127.0.0.1' || 
                        loc.hostname.startsWith('192.168.') || 
                        loc.hostname.startsWith('10.') || 
                        loc.hostname.startsWith('172.') || 
                        loc.hostname.endsWith('.local');
        
        const isNative = window.Capacitor && (
            window.Capacitor.isNative || 
            (window.Capacitor.getPlatform && window.Capacitor.getPlatform() !== 'web') ||
            navigator.userAgent.includes('Capacitor') ||
            loc.href.includes('capacitor://')
        );

        const storedUrl = localStorage.getItem('byahero_server_url');
        const isAuto = localStorage.getItem('byahero_server_url_is_auto') === 'true';

        if (isLocal && !isNative) {
            if (!storedUrl || storedUrl === 'https://byahero.alwaysdata.net') {
                const match = loc.pathname.match(/\/[Bb]ya[Hh]ero/);
                const localUrl = loc.origin + (match ? match[0] : '');
                localStorage.setItem('byahero_server_url', localUrl);
                localStorage.setItem('byahero_server_url_is_auto', 'true');
            }
        } else {
            if (isAuto) {
                localStorage.removeItem('byahero_server_url');
                localStorage.removeItem('byahero_server_url_is_auto');
            }
        }
      })();

      // Clean up/migrate old server URLs
      const migrateStoredUrl = localStorage.getItem('byahero_server_url');
      if (migrateStoredUrl && migrateStoredUrl.includes('byahero.app')) {
        localStorage.removeItem('byahero_server_url');
      }
      async function safeGet(url) {
        if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.CapacitorHttp) {
          try {
            const res = await window.Capacitor.Plugins.CapacitorHttp.get({
              url,
              headers: {
                'Accept': 'application/json, text/plain, */*',
                'User-Agent': navigator.userAgent,
                'X-Requested-With': 'XMLHttpRequest'
              }
            });
            return res.data;
          } catch (e) {
            console.warn("CapacitorHttp get failed:", e);
            throw e;
          }
        } else {
          const res = await fetch(url, {
            headers: {
              'Accept': 'application/json, text/plain, */*',
              'X-Requested-With': 'XMLHttpRequest'
            }
          });
          return await res.json();
        }
      }

      async function syncDataAndRedirect() {
        const cachedRole = localStorage.getItem('byahero_cached_role');
        const cachedEmail = localStorage.getItem('byahero_cached_email');
        const SERVER_URL = localStorage.getItem('byahero_server_url') || 'https://byahero.alwaysdata.net';

        // Try to sync with a 1.2 second timeout
        try {
          const syncPromise = safeGet(SERVER_URL + '/public/api.php?action=get_sync_data');
          const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('Sync timeout')), 1200));
          
          const data = await Promise.race([syncPromise, timeoutPromise]);
          if (data && data.success) {
            if (data.stops_terminal) localStorage.setItem('byahero_cached_stops_terminal', JSON.stringify(data.stops_terminal));
            if (data.bus_stops) localStorage.setItem('byahero_cached_bus_stops', JSON.stringify(data.bus_stops));
            if (data.bus_fares) localStorage.setItem('byahero_cached_bus_fares', JSON.stringify(data.bus_fares));
            if (data.bus_schedule) localStorage.setItem('byahero_cached_bus_schedule', JSON.stringify(data.bus_schedule));
            localStorage.setItem('byahero_last_sync_time', Date.now().toString());
          }
        } catch (e) {
          console.warn("Sync warning:", e);
        }

        // Always route to local files to support offline-first operation
        if (!cachedRole || !cachedEmail) {
          window.location.replace("login.html");
        } else {
          if (cachedRole === 'passenger') {
            window.location.replace("passenger/index.html");
          } else if (cachedRole === 'conductor') {
            window.location.replace("conductor/index.html");
          } else {
            window.location.replace("login.html");
          }
        }
      }

      function checkCapacitorReady() {
        return new Promise((resolve) => {
          if (window.Capacitor && window.Capacitor.Plugins) {
            resolve();
          } else {
            let attempts = 0;
            const interval = setInterval(() => {
              attempts++;
              if ((window.Capacitor && window.Capacitor.Plugins) || attempts > 30) {
                clearInterval(interval);
                resolve();
              }
            }, 30);
          }
        });
      }

      // Execute sync and route when page loads and Capacitor is ready
      window.addEventListener('load', () => {
        checkCapacitorReady().then(() => {
          syncDataAndRedirect();
        });
      });
    </script>
    <meta
      http-equiv="refresh"
      content="3; url=login.html"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ByaHero</title>
  </head>
  <body></body>
</html>
