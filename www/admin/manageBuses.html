<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <link rel="icon" href="../assets/images/byaheroLogoBlue.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <title>ByaHero — Total Buses</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/admin/manageBuses.css">
</head>

<body data-page-title="Total Buses" data-page-type="generic" data-back-link="index.html">

    <div id="navbar-top-placeholder"></div>

    <div class="container py-4" style="max-width: 420px;">
        <!-- Alert Banner -->
        <div id="alertBanner" class="alert d-none alert-dismissible fade show shadow-sm mb-4" role="alert" style="border-radius: 12px;">
            <span id="alertMessage"></span>
            <button type="button" class="btn-close" onclick="closeAlert()"></button>
        </div>

        <!-- Add Bus Form -->
        <div class="bg-light rounded-4 p-4 border mb-4">
            <h2 class="fw-bold text-dark mb-3" style="font-size: 1.25rem;">Add Bus</h2>
            <form id="addBusForm">
                <div class="mb-3">
                    <input type="text" name="code" class="form-control bg-white border" style="border-radius: 8px; padding: 10px 15px; font-size: 0.95rem;" placeholder="Bus Code (e.g. BUS-001)" required>
                </div>
                <div class="text-end">
                    <button type="submit" class="btn btn-primary rounded-pill px-4 py-2 fw-bold" style="background-color: #1e5dd9; border-color: #1e5dd9; font-size: 0.85rem;">Save</button>
                </div>
            </form>
        </div>

        <!-- Buses List -->
        <div>
            <h2 class="fw-bold text-dark mb-3" style="font-size: 1.25rem;">All Buses</h2>
            <div id="busesContainer">
                <div class="text-center py-4">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="navbar-menu-placeholder"></div>
    <div id="navbar-bottom-placeholder"></div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbarAdmin.js"></script>

    <script>
        function closeAlert() {
            document.getElementById('alertBanner').classList.add('d-none');
        }

        function showAlert(message, type = 'success') {
            const banner = document.getElementById('alertBanner');
            banner.className = `alert alert-${type} alert-dismissible fade show shadow-sm mb-4`;
            document.getElementById('alertMessage').innerHTML = message;
            banner.classList.remove('d-none');
            setTimeout(() => {
                banner.classList.add('d-none');
            }, 5000);
        }

        async function loadBuses() {
            try {
                const res = await fetch('manageBuses.php?json=1');
                const data = await res.json();
                
                if (data.success === false) {
                    showAlert(data.error || 'Failed to fetch buses.', 'danger');
                    return;
                }

                const container = document.getElementById('busesContainer');
                if (data.buses.length === 0) {
                    container.innerHTML = `<p class="text-muted small">No buses yet. Add one above.</p>`;
                    return;
                }

                let html = '';
                data.buses.forEach(bus => {
                    const id = bus.Bus_ID || bus.id;
                    const status = bus.status === 'available' ? 'available' : 'unavailable';
                    const code = bus.code || 'BUS';
                    
                    const statusBadge = status === 'available' 
                        ? `<span class="badge rounded-pill px-3 py-1 fw-bold text-uppercase" style="background: #a7f3d0; color: #065f46; font-size: 0.75rem;">Available</span>`
                        : `<span class="badge rounded-pill px-3 py-1 fw-bold text-uppercase" style="background: #fecaca; color: #991b1b; font-size: 0.75rem;">Unavailable</span>`;

                    html += `
                        <div class="bg-white rounded-4 p-4 border mb-3 shadow-sm d-flex gap-3" style="border-color: rgba(148, 163, 184, 0.35) !important;">
                            <div class="d-flex justify-content-center mt-1" style="width: 60px; flex-shrink: 0;">
                                <img src="../assets/images/busonallbuses.svg" alt="Bus Icon" style="max-width: 100%; height: auto;">
                            </div>

                            <div class="flex-grow-1">
                                <div class="d-flex justify-content-between align-items-center mb-2" style="font-size: 0.95rem;">
                                    <span class="text-secondary" style="font-size: 0.9rem;">Code</span>
                                    <span class="fw-bold text-dark">${code}</span>
                                </div>

                                <div class="d-flex justify-content-between align-items-center mb-2" style="font-size: 0.95rem;">
                                    <span class="text-secondary" style="font-size: 0.9rem;">Status</span>
                                    ${statusBadge}
                                </div>

                                <div class="d-flex justify-content-between align-items-center mb-2" style="font-size: 0.95rem; margin-top: 4px;">
                                    <span class="text-secondary" style="font-size: 0.9rem;">Actions</span>
                                    <div class="d-flex align-items-center justify-content-end">
                                        <select id="statusSelect-${id}" class="form-select rounded-pill px-3 py-1 fw-semibold text-dark border-0 bg-light" style="font-size: 0.8rem; min-width: 120px; box-shadow: inset 0 0 0 1px #e5e7eb;">
                                            <option value="available" ${status === 'available' ? 'selected' : ''}>Available</option>
                                            <option value="unavailable" ${status === 'unavailable' ? 'selected' : ''}>Unavailable</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="d-flex justify-content-end gap-2 mt-3">
                                    <button type="button" class="btn btn-primary rounded-pill px-4 py-2 fw-bold" onclick="updateBus(${id})" style="background-color: #1e5dd9; border-color: #1e5dd9; font-size: 0.85rem;">Save</button>
                                    <button type="button" class="btn btn-danger rounded-pill px-4 py-2 fw-bold" onclick="deleteBus(${id}, '${code}')" style="background-color: #b91c1c; border-color: #b91c1c; font-size: 0.85rem;">Delete</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;

            } catch (err) {
                console.error(err);
                showAlert('Failed to connect to the server.', 'danger');
            }
        }

        async function updateBus(id) {
            const status = document.getElementById(`statusSelect-${id}`).value;
            const formData = new FormData();
            formData.append('action', 'update_bus');
            formData.append('id', id);
            formData.append('status', status);

            try {
                const res = await fetch('manageBuses.php', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    showAlert(data.message || 'Bus status updated.');
                    loadBuses();
                } else {
                    showAlert(data.error || 'Failed to update bus.', 'danger');
                }
            } catch(err) {
                console.error(err);
                showAlert('Failed to connect to the server.', 'danger');
            }
        }

        async function deleteBus(id, code) {
            if (!confirm(`Delete bus ${code}?`)) {
                return;
            }
            const formData = new FormData();
            formData.append('action', 'delete_bus');
            formData.append('id', id);

            try {
                const res = await fetch('manageBuses.php', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    showAlert(data.message || 'Bus deleted successfully.');
                    loadBuses();
                } else {
                    showAlert(data.error || 'Failed to delete bus.', 'danger');
                }
            } catch(err) {
                console.error(err);
                showAlert('Failed to connect to the server.', 'danger');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadBuses();

            // Add bus submission
            document.getElementById('addBusForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                formData.append('action', 'add_bus');

                try {
                    const res = await fetch('manageBuses.php', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    if (data.success) {
                        showAlert(data.message || 'Bus added successfully.');
                        e.target.reset();
                        loadBuses();
                    } else {
                        showAlert(data.error || 'Failed to add bus.', 'danger');
                    }
                } catch(err) {
                    console.error(err);
                    showAlert('Failed to connect to the server.', 'danger');
                }
            });
        });
    </script>
</body>

</html>
