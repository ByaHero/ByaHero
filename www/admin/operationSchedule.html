<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <link rel="icon" href="../assets/images/byaheroLogoBlue.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <title>ByaHero — Operation Schedule</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/admin/operationSchedule.css">
</head>

<body data-page-title="Operation Schedule" data-page-type="generic" data-back-link="index.html">

    <div id="navbar-top-placeholder"></div>

    <div class="container py-4">
        <!-- Alert Banner -->
        <div id="alertBanner" class="alert d-none alert-dismissible fade show shadow-sm mt-3" role="alert">
            <span id="alertIcon" class="material-symbols-rounded align-middle me-2"></span>
            <span id="alertMessage"></span>
            <button type="button" class="btn-close" onclick="closeAlert()"></button>
        </div>

        <div class="row g-4 mt-1">
            <div class="col-lg-8 mx-auto">
                <div class="card border-0 shadow-sm rounded-4 bg-white overflow-hidden">
                    <div class="card-header bg-white border-bottom border-light-subtle py-3 px-4 d-flex align-items-center gap-2 text-primary">
                        <span class="fs-4 fw-bold">Operation Schedule</span>
                    </div>

                    <div class="card-body p-4">
                        <form id="schedulesForm">
                            <!-- ROUTE 1: LAUREL - TANAUAN -->
                            <div class="card card-body border border-light-subtle rounded-4 p-3 mb-3 bg-light">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <h6 class="fw-bold m-0 text-dark">LAUREL - TANAUAN</h6>
                                    <div class="form-check form-switch m-0">
                                        <input class="form-check-input" type="checkbox" role="switch" id="lt_susp" name="lt_suspended">
                                        <label class="form-check-label fw-semibold small text-danger" for="lt_susp">
                                            Suspend Route
                                        </label>
                                    </div>
                                </div>

                                <div class="row g-2 align-items-end">
                                    <div class="col-6">
                                        <label class="form-label small text-uppercase fw-bold text-secondary">Open Time</label>
                                        <input type="time" class="form-control" name="lt_open" id="lt_open" style="border-radius: 8px;">
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label small text-uppercase fw-bold text-secondary">Close Time</label>
                                        <input type="time" class="form-control" name="lt_close" id="lt_close" style="border-radius: 8px;">
                                    </div>
                                </div>

                                <div class="mt-3">
                                    <label class="form-label small text-uppercase fw-bold text-secondary">
                                        Suspend message (optional)
                                    </label>
                                    <input type="text" class="form-control" name="lt_message" id="lt_message" placeholder="e.g. Suspended due to bad weather" style="border-radius: 8px;">
                                </div>
                            </div>

                            <!-- ROUTE 2: TANAUAN - LAUREL -->
                            <div class="card card-body border border-light-subtle rounded-4 p-3 mb-4 bg-light">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <h6 class="fw-bold m-0 text-dark">TANAUAN - LAUREL</h6>
                                    <div class="form-check form-switch m-0">
                                        <input class="form-check-input" type="checkbox" role="switch" id="tl_susp" name="tl_suspended">
                                        <label class="form-check-label fw-semibold small text-danger" for="tl_susp">
                                            Suspend Route
                                        </label>
                                    </div>
                                </div>

                                <div class="row g-2 align-items-end">
                                    <div class="col-6">
                                        <label class="form-label small text-uppercase fw-bold text-secondary">Open Time</label>
                                        <input type="time" class="form-control" name="tl_open" id="tl_open" style="border-radius: 8px;">
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label small text-uppercase fw-bold text-secondary">Close Time</label>
                                        <input type="time" class="form-control" name="tl_close" id="tl_close" style="border-radius: 8px;">
                                    </div>
                                </div>

                                <div class="mt-3">
                                    <label class="form-label small text-uppercase fw-bold text-secondary">
                                        Suspend message (optional)
                                    </label>
                                    <input type="text" class="form-control" name="tl_message" id="tl_message" placeholder="e.g. Suspended due to bad weather" style="border-radius: 8px;">
                                </div>
                            </div>

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary rounded-pill fw-bold py-3 text-uppercase tracking-wider">Save Schedules</button>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div id="navbar-menu-placeholder"></div>
    <div id="navbar-bottom-placeholder"></div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbarAdmin.js"></script>

    <script>
        function closeAlert() {
            document.getElementById('alertBanner').classList.add('d-none');
        }

        function showAlert(message, type = 'success') {
            const banner = document.getElementById('alertBanner');
            const icon = document.getElementById('alertIcon');
            banner.className = `alert alert-${type} alert-dismissible fade show shadow-sm mt-3`;
            icon.textContent = type === 'success' ? 'check_circle' : 'error';
            document.getElementById('alertMessage').textContent = message;
            banner.classList.remove('d-none');
            setTimeout(() => {
                banner.classList.add('d-none');
            }, 5000);
        }

        function formatTimeShort(t) {
            if (!t) return '';
            return t.substring(0, 5); // HH:MM:SS -> HH:MM
        }

        async function loadSchedules() {
            try {
                const res = await fetch('operationSchedule.php?json=1');
                const data = await res.json();
                
                if (data.success === false) {
                    showAlert(data.error || 'Failed to fetch schedules.', 'danger');
                    return;
                }

                const lt = data.schedules.laurel_tanauan || {};
                const tl = data.schedules.tanauan_laurel || {};

                // Laurel - Tanauan fields
                document.getElementById('lt_susp').checked = parseInt(lt.is_suspended) === 1;
                document.getElementById('lt_open').value = formatTimeShort(lt.time_open);
                document.getElementById('lt_close').value = formatTimeShort(lt.time_close);
                document.getElementById('lt_message').value = lt.suspend_message || '';

                // Tanauan - Laurel fields
                document.getElementById('tl_susp').checked = parseInt(tl.is_suspended) === 1;
                document.getElementById('tl_open').value = formatTimeShort(tl.time_open);
                document.getElementById('tl_close').value = formatTimeShort(tl.time_close);
                document.getElementById('tl_message').value = tl.suspend_message || '';

            } catch (err) {
                console.error(err);
                showAlert('Failed to connect to the server.', 'danger');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadSchedules();

            document.getElementById('schedulesForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                formData.append('action', 'save_routes');

                // Switch fields require explicit handling for FormData when unchecked
                if (!document.getElementById('lt_susp').checked) {
                    formData.delete('lt_suspended');
                } else {
                    formData.set('lt_suspended', '1');
                }
                if (!document.getElementById('tl_susp').checked) {
                    formData.delete('tl_suspended');
                } else {
                    formData.set('tl_suspended', '1');
                }

                try {
                    const res = await fetch('operationSchedule.php', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    if (data.success) {
                        showAlert(data.message || 'Schedules updated successfully.');
                        loadSchedules();
                    } else {
                        showAlert(data.error || 'Failed to save schedules.', 'danger');
                    }
                } catch(err) {
                    console.error(err);
                    showAlert('Failed to connect to the server.', 'danger');
                }
            });
        });
    </script>
</body>

</html>
