<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <link rel="icon" href="../assets/images/byaheroLogoBlue.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <title>ByaHero — Manage Conductors & Drivers</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/admin/manageConductors.css">
</head>

<body data-page-title="Manage Staff" data-page-type="generic" data-back-link="index.html">

    <div id="navbar-top-placeholder"></div>

    <div class="container py-3 py-lg-4" style="max-width: 480px;">
        <!-- Alert Banner -->
        <div id="alertBanner" class="alert d-none alert-dismissible fade show shadow-sm" role="alert" style="border-radius: 14px;">
            <span id="alertMessage"></span>
            <button type="button" class="btn-close" onclick="closeAlert()"></button>
        </div>

        <h2 class="text-center fw-bold fs-4 mb-3" style="color: #0f172a; margin: 18px 0 14px;">New Conductor & Driver</h2>

        <div class="bg-white rounded-4 shadow border p-4 mb-4" style="border-color: rgba(148, 163, 184, 0.35) !important;">
            <form id="addStaffForm">
                <div class="mb-3">
                    <div class="small text-secondary fw-semibold mb-1" style="font-size: 0.78rem;">First Name</div>
                    <input type="text" class="form-control shadow-sm px-3 py-2" style="border-radius: 10px; border: 1px solid rgba(148, 163, 184, 0.55);" placeholder="First Name" disabled>
                </div>

                <div class="mb-3">
                    <div class="small text-secondary fw-semibold mb-1" style="font-size: 0.78rem;">Last name</div>
                    <input type="text" class="form-control shadow-sm px-3 py-2" style="border-radius: 10px; border: 1px solid rgba(148, 163, 184, 0.55);" placeholder="Last name" disabled>
                </div>

                <div class="mb-3">
                    <div class="small text-secondary fw-semibold mb-1" style="font-size: 0.78rem;">Email</div>
                    <input type="email" name="email" class="form-control shadow-sm px-3 py-2" style="border-radius: 10px; border: 1px solid rgba(148, 163, 184, 0.55);" placeholder="staff@byahero.com" required>
                </div>

                <div class="mb-3">
                    <div class="small text-secondary fw-semibold mb-1" style="font-size: 0.78rem;">Password</div>
                    <div class="pw-wrap position-relative">
                        <input type="password" name="password" id="pwField" class="form-control shadow-sm px-3 py-2 pe-5" style="border-radius: 10px; border: 1px solid rgba(148, 163, 184, 0.55);" required>
                        <button type="button" class="pw-eye position-absolute end-0 top-50 translate-middle-y border-0 bg-transparent pe-3" id="togglePw" aria-pressed="false" aria-label="Show password" title="Show password" style="z-index: 10;">
                            <img src="../assets/images/hash.svg" id="eyeIcon" style="width:18px; height:18px;" alt="Show password">
                        </button>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="small text-secondary fw-semibold mb-1" style="font-size: 0.78rem;">Role</div>
                    <select name="role" class="form-select shadow-sm px-3 py-2" style="border-radius: 10px; border: 1px solid rgba(148, 163, 184, 0.55);" aria-label="Role">
                        <option value="conductor" selected>Conductor</option>
                        <option value="driver">Driver</option>
                    </select>
                </div>

                <div class="d-flex justify-content-center mt-4">
                    <button type="submit" class="btn btn-primary rounded-pill px-5 py-2 fw-bold" style="background-color: #1d4ed8; border-color: #1d4ed8; font-size: 0.95rem;">Save</button>
                </div>
            </form>
        </div>

        <div class="d-flex justify-content-between align-items-center fw-bold mt-4 mb-2 mx-auto" style="max-width: 420px; color: #0f172a; cursor: pointer; user-select: none;" data-bs-toggle="collapse" data-bs-target="#staffListCollapse" aria-expanded="false" aria-controls="staffListCollapse">
            <span>Registered Staff</span>
            <span class="material-symbols-rounded transition-icon text-muted">expand_more</span>
        </div>
        <div class="collapse show" id="staffListCollapse">
            <div class="bg-white rounded-4 shadow border overflow-hidden mb-4" id="staffContainer" style="max-width: 420px; margin: 0 auto; border-color: rgba(148, 163, 184, 0.30) !important;">
                <div class="text-center py-4">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div id="navbar-menu-placeholder"></div>
    <div id="navbar-bottom-placeholder"></div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbarAdmin.js"></script>

    <script>
        function closeAlert() {
            document.getElementById('alertBanner').classList.add('d-none');
        }

        function showAlert(message, type = 'success') {
            const banner = document.getElementById('alertBanner');
            banner.className = `alert alert-${type} alert-dismissible fade show shadow-sm mb-4`;
            document.getElementById('alertMessage').innerHTML = message;
            banner.classList.remove('d-none');
            setTimeout(() => {
                banner.classList.add('d-none');
            }, 5000);
        }

        async function loadStaff() {
            try {
                const res = await fetch('manageConductors.php?json=1');
                const data = await res.json();
                
                if (data.success === false) {
                    showAlert(data.error || 'Failed to fetch staff list.', 'danger');
                    return;
                }

                const container = document.getElementById('staffContainer');
                if (data.staff.length === 0) {
                    container.innerHTML = `<div class="text-center text-muted py-4">No staff accounts found.</div>`;
                    return;
                }

                let html = '';
                data.staff.forEach(u => {
                    const roleBadge = u.role === 'driver' 
                        ? `<span class="badge rounded-pill bg-primary bg-opacity-10 text-primary px-2 py-1 text-uppercase fw-bold" style="font-size: 0.72rem;">Driver</span>`
                        : `<span class="badge rounded-pill bg-success bg-opacity-10 text-success px-2 py-1 text-uppercase fw-bold" style="font-size: 0.72rem;">Conductor</span>`;

                    html += `
                        <div class="d-flex justify-content-between align-items-center gap-2 p-3 border-bottom" style="border-bottom-color: #f1f5f9 !important;">
                            <div style="min-width:0; flex-grow:1;">
                                <p class="fw-bold mb-0 text-truncate text-dark" style="font-size: 0.95rem;">${u.email}</p>
                                <p class="mb-0 text-secondary" style="font-size: 0.78rem;">${u.created_at || ''}</p>
                            </div>

                            <div class="d-flex align-items-center gap-2 flex-shrink-0">
                                ${roleBadge}
                                <button class="btn btn-danger rounded-pill px-3 py-1 fw-bold" style="background-color: #dc2626; border-color: #dc2626; font-size: 0.78rem;" onclick="removeStaff(${u.id}, '${u.role}', '${u.email}')">Remove</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;

            } catch (err) {
                console.error(err);
                showAlert('Failed to connect to the server.', 'danger');
            }
        }

        async function removeStaff(id, role, email) {
            if (!confirm(`Delete ${email}?`)) {
                return;
            }
            const formData = new FormData();
            formData.append('action', 'delete_user');
            formData.append('id', id);
            formData.append('role', role);

            try {
                const res = await fetch('manageConductors.php', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    showAlert(data.message || 'Staff removed.');
                    loadStaff();
                } else {
                    showAlert(data.error || 'Failed to remove staff.', 'danger');
                }
            } catch(err) {
                console.error(err);
                showAlert('Failed to connect to the server.', 'danger');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadStaff();

            // Password field toggle logic
            const pw = document.getElementById('pwField');
            const toggle = document.getElementById('togglePw');
            const eye = document.getElementById('eyeIcon');

            toggle.addEventListener('click', () => {
                if (pw.type === 'password') {
                    pw.type = 'text';
                    eye.src = '../assets/images/pass.svg';
                    toggle.setAttribute('aria-pressed', 'true');
                } else {
                    pw.type = 'password';
                    eye.src = '../assets/images/hash.svg';
                    toggle.setAttribute('aria-pressed', 'false');
                }
            });

            // Form Submit logic
            document.getElementById('addStaffForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                formData.append('action', 'add_user');

                try {
                    const res = await fetch('manageConductors.php', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    if (data.success) {
                        showAlert(data.message || 'Staff registered successfully.');
                        e.target.reset();
                        eye.src = '../assets/images/hash.svg';
                        pw.type = 'password';
                        loadStaff();
                    } else {
                        showAlert(data.error || 'Failed to register staff.', 'danger');
                    }
                } catch(err) {
                    console.error(err);
                    showAlert('Failed to connect to the server.', 'danger');
                }
            });
        });
    </script>
</body>

</html>
