<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <link rel="icon" href="../assets/images/byaheroLogoBlue.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <title>ByaHero — Passenger Feedbacks</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/admin/manageFeedbacks.css">
</head>

<body data-page-title="Commuter Feedbacks" data-page-type="generic" data-back-link="index.html">

    <div id="navbar-top-placeholder"></div>

    <div class="container py-4">
        <!-- Alert Banner -->
        <div id="alertBanner" class="alert d-none alert-dismissible fade show shadow-sm mt-3" role="alert">
            <span id="alertIcon" class="material-symbols-rounded align-middle me-2"></span>
            <span id="alertMessage"></span>
            <button type="button" class="btn-close" onclick="closeAlert()"></button>
        </div>

        <div class="row g-4 mt-1 mb-5">
            <div class="col-lg-8 mx-auto">
                <div class="card border-0 rounded-4 shadow-sm bg-white">
                    <div class="card-header bg-white border-bottom fw-bold p-3 d-flex align-items-center gap-2 text-primary" style="border-radius: 16px 16px 0 0;">
                        <span class="fs-4">Passenger Feedbacks</span>
                    </div>

                    <div class="card-body">
                        <!-- Summary Stats Section -->
                        <div id="summaryStatsContainer" class="d-none">
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <div class="p-3 bg-light rounded-3 border d-flex align-items-center gap-3 h-100">
                                        <div class="display-5 fw-bold text-primary" id="avgRatingVal">0.0</div>
                                        <div>
                                            <div class="text-muted small text-uppercase fw-bold mb-1">Average Rating</div>
                                            <div class="d-flex align-items-center" id="avgStarsContainer">
                                                <!-- Stars rendered dynamically -->
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="p-3 bg-light rounded-3 border d-flex align-items-center gap-3 h-100">
                                        <div class="display-6 fw-bold text-primary">
                                            <span class="material-symbols-rounded" style="font-size: 2.5rem; vertical-align: middle;">forum</span>
                                        </div>
                                        <div>
                                            <div class="text-muted small text-uppercase fw-bold mb-1">Total Comments</div>
                                            <div class="fs-4 fw-bold text-dark" id="totalCommentsVal">0</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <hr class="mb-4" style="border-color: #e2e8f0;">
                        </div>

                        <!-- Feedbacks Container -->
                        <div id="feedbacksContainer">
                            <div class="text-center py-5">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="navbar-menu-placeholder"></div>
    <div id="navbar-bottom-placeholder"></div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbarAdmin.js"></script>

    <script>
        function closeAlert() {
            document.getElementById('alertBanner').classList.add('d-none');
        }

        function showAlert(message, type = 'success') {
            const banner = document.getElementById('alertBanner');
            const icon = document.getElementById('alertIcon');
            banner.className = `alert alert-${type} alert-dismissible fade show shadow-sm mt-3`;
            icon.textContent = type === 'success' ? 'check_circle' : 'error';
            document.getElementById('alertMessage').textContent = message;
            banner.classList.remove('d-none');
            setTimeout(() => {
                banner.classList.add('d-none');
            }, 5000);
        }

        function getStarsHtml(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= rating) {
                    stars += '<img src="../assets/images/star_full.svg" style="width: 20px; height: 20px; margin-right: 2px;" alt="★">';
                } else {
                    stars += '<img src="../assets/images/star_blank.svg" style="width: 20px; height: 20px; margin-right: 2px;" alt="☆">';
                }
            }
            return stars;
        }

        async function loadFeedbacks() {
            try {
                const res = await fetch('manageFeedbacks.php?json=1');
                const data = await res.json();
                
                if (data.success === false) {
                    showAlert(data.error || 'Failed to fetch feedbacks.', 'danger');
                    return;
                }

                // Render Summary stats
                if (data.totalFeedbacks > 0) {
                    document.getElementById('avgRatingVal').textContent = parseFloat(data.averageRating).toFixed(1);
                    document.getElementById('totalCommentsVal').textContent = data.totalComments;
                    
                    const avgStars = document.getElementById('avgStarsContainer');
                    avgStars.innerHTML = getStarsHtml(Math.round(data.averageRating)) + 
                        `<span class="ms-2 small text-muted">(${data.totalFeedbacks} ratings)</span>`;
                    
                    document.getElementById('summaryStatsContainer').classList.remove('d-none');
                } else {
                    document.getElementById('summaryStatsContainer').classList.add('d-none');
                }

                const container = document.getElementById('feedbacksContainer');
                if (data.feedbacks.length === 0) {
                    container.innerHTML = `<p class="text-muted small text-center py-4">No feedbacks submitted yet.</p>`;
                    return;
                }

                let html = '';
                data.feedbacks.forEach(fb => {
                    const id = fb.id;
                    const rating = parseInt(fb.rating);
                    const formattedDate = new Date(fb.created_at).toLocaleString('en-US', {
                        month: 'short',
                        day: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: true
                    });

                    const rawName = fb.passenger_name || 'Unknown User';
                    const firstName = rawName.split(' ')[0];
                    const email = fb.passenger_email || '';

                    const commentHtml = fb.feedback_text && fb.feedback_text.trim() !== ''
                        ? `<div class="text-dark bg-light p-2 rounded-2 mt-1" style="white-space: pre-wrap;">${fb.feedback_text}</div>`
                        : `<div class="text-muted bg-light p-2 rounded-2 mt-1" style="font-style: italic;">No additional comments.</div>`;

                    html += `
                        <div class="border rounded-4 bg-white p-3 mb-3 shadow-xs">
                            <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                                <span class="fw-bold text-primary text-uppercase" style="font-size: 0.95rem;">
                                    <span class="material-symbols-rounded" style="vertical-align: text-bottom; font-size: 1.1rem;">
                                        reviews
                                    </span>
                                    FEEDBACK #${id}
                                </span>
                                <span class="small text-secondary" style="font-size: 0.8rem;">${formattedDate}</span>
                            </div>

                            <div class="row">
                                <div class="col-sm-6 col-12 mb-2" style="font-size: 0.95rem;">
                                    <span class="text-primary fw-semibold d-block" style="font-size: 0.85rem;">Passenger</span>
                                    <div class="text-dark bg-light p-2 rounded-2 mt-1">
                                        #${fb.user_id} - ${firstName}
                                        <div class="small text-muted text-break">${email}</div>
                                    </div>
                                </div>
                                <div class="col-sm-6 col-12 mb-2" style="font-size: 0.95rem;">
                                    <span class="text-primary fw-semibold d-block" style="font-size: 0.85rem;">Rating</span>
                                    <div class="text-dark bg-light p-2 rounded-2 mt-1 d-flex align-items-center" style="height: calc(100% - 1.25rem - 4px); min-height: 40px;">
                                        ${getStarsHtml(rating)}
                                    </div>
                                </div>
                            </div>

                            <div class="mb-2 mt-2" style="font-size: 0.95rem;">
                                <span class="text-primary fw-semibold d-block" style="font-size: 0.85rem;">Comments</span>
                                ${commentHtml}
                            </div>

                            <hr class="mt-4 mb-3" style="border-color: #e2e8f0;">

                            <div class="d-flex justify-content-end align-items-center">
                                <button type="button" class="btn btn-danger rounded-pill px-3 py-1 fw-bold shadow-sm" onclick="deleteFeedback(${id})" style="background-color: #ef4444; border-color: #ef4444; font-size: 0.8rem;">Delete</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;

            } catch (err) {
                console.error(err);
                showAlert('Failed to connect to the server.', 'danger');
            }
        }

        async function deleteFeedback(id) {
            if (!confirm(`Permanently delete feedback #${id}?`)) {
                return;
            }
            const formData = new FormData();
            formData.append('action', 'delete_feedback');
            formData.append('id', id);

            try {
                const res = await fetch('manageFeedbacks.php', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    showAlert(data.message || 'Feedback deleted successfully.');
                    loadFeedbacks();
                } else {
                    showAlert(data.error || 'Failed to delete feedback.', 'danger');
                }
            } catch(err) {
                console.error(err);
                showAlert('Failed to connect to the server.', 'danger');
            }
        }

        document.addEventListener('DOMContentLoaded', loadFeedbacks);
    </script>
</body>

</html>
