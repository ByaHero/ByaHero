<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <link class="icon" href="../assets/images/byaheroLogoBlue.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <title>ByaHero — Passenger Reports</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/admin/manageReports.css">
</head>

<body data-page-title="Passenger Reports" data-page-type="generic" data-back-link="index.html">

    <div id="navbar-top-placeholder"></div>

    <div class="container py-4">
        <!-- Alert Banner -->
        <div id="alertBanner" class="alert d-none alert-dismissible fade show shadow-sm mt-3" role="alert">
            <span id="alertIcon" class="material-symbols-rounded align-middle me-2"></span>
            <span id="alertMessage"></span>
            <button type="button" class="btn-close" onclick="closeAlert()"></button>
        </div>

        <div class="row g-4 mt-1 mb-5">
            <div class="col-lg-8 mx-auto">
                <div class="card border-0 rounded-4 shadow-sm bg-white">
                    <div class="card-header bg-white border-bottom fw-bold p-3 d-flex align-items-center gap-2 text-primary" style="border-radius: 16px 16px 0 0;">
                        <span class="fs-4">Passenger Reports</span>
                    </div>

                    <div class="card-body">
                        <div id="reportsContainer">
                            <div class="text-center py-5">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="navbar-menu-placeholder"></div>
    <div id="navbar-bottom-placeholder"></div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbarAdmin.js"></script>

    <script>
        function closeAlert() {
            document.getElementById('alertBanner').classList.add('d-none');
        }

        function showAlert(message, type = 'success') {
            const banner = document.getElementById('alertBanner');
            const icon = document.getElementById('alertIcon');
            banner.className = `alert alert-${type} alert-dismissible fade show shadow-sm mt-3`;
            icon.textContent = type === 'success' ? 'check_circle' : 'error';
            document.getElementById('alertMessage').textContent = message;
            banner.classList.remove('d-none');
            setTimeout(() => {
                banner.classList.add('d-none');
            }, 5000);
        }

        async function loadReports() {
            try {
                const res = await fetch('manageReports.php?json=1');
                const data = await res.json();
                
                if (data.success === false) {
                    showAlert(data.error || 'Failed to fetch passenger reports.', 'danger');
                    return;
                }

                const container = document.getElementById('reportsContainer');
                if (data.reports.length === 0) {
                    container.innerHTML = `<p class="text-muted small text-center py-4">No reports submitted yet.</p>`;
                    return;
                }

                let html = '';
                data.reports.forEach(report => {
                    const id = report.id;
                    const status = report.status || 'pending';
                    const formattedDate = new Date(report.created_at).toLocaleString('en-US', {
                        month: 'short',
                        day: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: true
                    });

                    const rawName = report.reporter_name || 'Unknown User';
                    const firstName = rawName.split(' ')[0];
                    const email = report.reporter_email || '';
                    const busNum = report.bus_number ? report.bus_number : 'N/A';
                    
                    const contactStr = report.contact_number 
                        ? `<a href="tel:${report.contact_number}" class="text-decoration-none fw-bold text-primary">
                             <span class="material-symbols-rounded" style="font-size: 14px; vertical-align: middle;">call</span>
                             ${report.contact_number}
                           </a>`
                        : `<i class="text-muted">None provided</i>`;

                    const detailsHtml = report.others_details && report.others_details.trim() !== ''
                        ? `<div class="mb-2" style="font-size: 0.95rem;">
                               <span class="text-primary fw-semibold d-block" style="font-size: 0.85rem;">Additional Details</span>
                               <div class="text-dark bg-light p-2 rounded-2 mt-1" style="white-space: pre-wrap;">${report.others_details}</div>
                           </div>`
                        : '';

                    html += `
                        <div class="border rounded-4 bg-white p-3 mb-3 shadow-xs">
                            <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                                <span class="fw-bold text-primary text-uppercase" style="font-size: 0.95rem;">
                                    <span class="material-symbols-rounded" style="vertical-align: text-bottom; font-size: 1.1rem;">
                                        report
                                    </span>
                                    REPORT #${id}
                                </span>
                                <span class="small text-secondary" style="font-size: 0.8rem;">${formattedDate}</span>
                            </div>

                            <div class="row">
                                <div class="col-sm-4 col-12 mb-2" style="font-size: 0.95rem;">
                                    <span class="text-primary fw-semibold d-block" style="font-size: 0.85rem;">Reporter</span>
                                    <div class="text-dark bg-light p-2 rounded-2 mt-1">
                                        #${report.user_id} - ${firstName}
                                        <div class="small text-muted text-break">${email}</div>
                                    </div>
                                </div>
                                <div class="col-sm-4 col-12 mb-2" style="font-size: 0.95rem;">
                                    <span class="text-primary fw-semibold d-block" style="font-size: 0.85rem;">Bus Number</span>
                                    <div class="text-dark bg-light p-2 rounded-2 mt-1 fw-bold" style="color: #1e3a8a;">
                                        <span class="material-symbols-rounded" style="font-size: 16px; vertical-align: middle;">directions_bus</span>
                                        ${busNum}
                                    </div>
                                </div>
                                <div class="col-sm-4 col-12 mb-2" style="font-size: 0.95rem;">
                                    <span class="text-primary fw-semibold d-block" style="font-size: 0.85rem;">Contact Number</span>
                                    <div class="text-dark bg-light p-2 rounded-2 mt-1">
                                        ${contactStr}
                                    </div>
                                </div>
                            </div>

                            <div class="mb-2 mt-2" style="font-size: 0.95rem;">
                                <span class="text-primary fw-semibold d-block" style="font-size: 0.85rem;">Report Reason</span>
                                <div class="text-danger bg-light p-2 rounded-2 mt-1 fw-bold">${report.report_reason}</div>
                            </div>

                            ${detailsHtml}

                            <hr class="mt-4 mb-3" style="border-color: #e2e8f0;">

                            <div class="d-flex justify-content-between align-items-center">
                                <div class="d-flex align-items-center gap-2">
                                    <span class="text-primary fw-semibold d-block m-0" style="font-size: 0.85rem;">Status:</span>
                                    <select id="statusSelect-${id}" class="form-select rounded-pill px-3 py-1 fw-semibold text-dark border-0 bg-light" onchange="updateStatus(${id})" style="font-size: 0.8rem; box-shadow: inset 0 0 0 1px #e5e7eb;">
                                        <option value="pending" ${status === 'pending' ? 'selected' : ''}>Pending</option>
                                        <option value="resolved" ${status === 'resolved' ? 'selected' : ''}>Resolved</option>
                                    </select>
                                </div>

                                <button type="button" class="btn btn-danger rounded-pill px-3 py-1 fw-bold shadow-sm" onclick="deleteReport(${id})" style="background-color: #ef4444; border-color: #ef4444; font-size: 0.8rem;">Delete</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;

            } catch (err) {
                console.error(err);
                showAlert('Failed to connect to the server.', 'danger');
            }
        }

        async function updateStatus(id) {
            const status = document.getElementById(`statusSelect-${id}`).value;
            const formData = new FormData();
            formData.append('action', 'update_status');
            formData.append('id', id);
            formData.append('status', status);

            try {
                const res = await fetch('manageReports.php', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    showAlert(data.message || 'Report status updated.');
                    loadReports();
                } else {
                    showAlert(data.error || 'Failed to update report status.', 'danger');
                }
            } catch(err) {
                console.error(err);
                showAlert('Failed to connect to the server.', 'danger');
            }
        }

        async function deleteReport(id) {
            if (!confirm(`Permanently delete report #${id}?`)) {
                return;
            }
            const formData = new FormData();
            formData.append('action', 'delete_report');
            formData.append('id', id);

            try {
                const res = await fetch('manageReports.php', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    showAlert(data.message || 'Report deleted successfully.');
                    loadReports();
                } else {
                    showAlert(data.error || 'Failed to delete report.', 'danger');
                }
            } catch(err) {
                console.error(err);
                showAlert('Failed to connect to the server.', 'danger');
            }
        }

        document.addEventListener('DOMContentLoaded', loadReports);
    </script>
</body>

</html>
