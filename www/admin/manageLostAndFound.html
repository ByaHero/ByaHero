<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <link rel="icon" href="../assets/images/byaheroLogoBlue.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <title>ByaHero — Lost & Found</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/admin/manageLostAndFound.css">
</head>

<body data-page-title="Lost & Found" data-page-type="generic" data-back-link="index.html">

    <div id="navbar-top-placeholder"></div>

    <div class="container py-4" style="max-width: 600px;">
        <!-- Alert Banner -->
        <div id="alertBanner" class="alert d-none alert-dismissible fade show shadow-sm" role="alert" style="border-radius: 12px;">
            <span id="alertMessage"></span>
            <button type="button" class="btn-close" onclick="closeAlert()"></button>
        </div>

        <h2 class="fw-bold text-dark mb-4" style="font-size: 1.25rem;">Lost and Found Board</h2>

        <div id="ticketsContainer">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Image Viewer Modal -->
    <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <div class="modal-content bg-transparent border-0">
                <div class="modal-header border-0 pb-0 justify-content-end p-2 p-md-3">
                    <button type="button" class="btn-close btn-close-white bg-dark rounded-circle p-2 shadow" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center pt-2">
                    <img id="modalImageDisplay" src="" alt="Full Screen Attachment" class="img-fluid rounded shadow-lg" style="max-height: 60vh; object-fit: contain;">
                </div>
            </div>
        </div>
    </div>

    <div id="navbar-menu-placeholder"></div>
    <div id="navbar-bottom-placeholder"></div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbarAdmin.js"></script>
    <script src="../assets/js/admin/manageLostAndFound.js"></script>

    <script>
        function closeAlert() {
            document.getElementById('alertBanner').classList.add('d-none');
        }

        function showAlert(message, type = 'success') {
            const banner = document.getElementById('alertBanner');
            banner.className = `alert alert-${type} alert-dismissible fade show shadow-sm mb-4`;
            document.getElementById('alertMessage').innerHTML = message;
            banner.classList.remove('d-none');
            setTimeout(() => {
                banner.classList.add('d-none');
            }, 5000);
        }

        async function loadTickets() {
            try {
                const res = await fetch('manageLostAndFound.php?json=1');
                const data = await res.json();
                
                if (data.success === false) {
                    showAlert(data.error || 'Failed to fetch lost and found tickets.', 'danger');
                    return;
                }

                const container = document.getElementById('ticketsContainer');
                if (data.tickets.length === 0) {
                    container.innerHTML = `<p class="text-muted small">No items reported yet.</p>`;
                    return;
                }

                const SERVER_URL = localStorage.getItem('byahero_server_url') || 'https://byahero.alwaysdata.net';
                let html = '';
                
                data.tickets.forEach(ticket => {
                    const id = ticket.id;
                    const type = ticket.type;
                    const status = ticket.status || 'open';
                    const textColorClass = type === 'lost' ? 'text-danger' : 'text-success';
                    const iconName = type === 'lost' ? 'search' : 'inventory_2';
                    const formattedDate = new Date(ticket.created_at).toLocaleString('en-US', {
                        month: 'short',
                        day: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: true
                    });

                    const rawName = ticket.reporter_name || 'Unknown User';
                    const firstName = rawName.split(' ')[0];
                    const contactStr = ticket.reporter_contact && ticket.reporter_contact !== 'None provided'
                        ? `<a href="tel:${ticket.reporter_contact}" class="text-decoration-none fw-bold text-primary">
                             <span class="material-symbols-rounded" style="font-size: 14px; vertical-align: middle;">call</span>
                             ${ticket.reporter_contact}
                           </a>`
                        : `<i class="text-muted">None provided</i>`;

                    const busNum = ticket.bus_number ? ticket.bus_number : '<i class="text-muted">Not specified</i>';

                    // Images URLs resolution
                    let imagesHtml = '';
                    if (ticket.image1_path || ticket.image2_path) {
                        imagesHtml += `<div class="mb-2 mt-3" style="font-size: 0.95rem;">
                                            <span class="text-secondary fw-semibold d-block mb-2" style="font-size: 0.85rem;">Attached Photos</span>
                                            <div class="d-flex gap-2">`;
                        
                        if (ticket.image1_path) {
                            const imgUrl = ticket.image1_path.startsWith('http') ? ticket.image1_path : `${SERVER_URL}/${ticket.image1_path}`;
                            imagesHtml += `<img src="${imgUrl}" class="rounded-2 border" style="width: 60px; height: 60px; object-fit: cover; cursor: zoom-in;" alt="Attachment 1" onclick="openImageModal('${imgUrl}')">`;
                        }
                        if (ticket.image2_path) {
                            const imgUrl = ticket.image2_path.startsWith('http') ? ticket.image2_path : `${SERVER_URL}/${ticket.image2_path}`;
                            imagesHtml += `<img src="${imgUrl}" class="rounded-2 border" style="width: 60px; height: 60px; object-fit: cover; cursor: zoom-in;" alt="Attachment 2" onclick="openImageModal('${imgUrl}')">`;
                        }

                        imagesHtml += `</div></div>`;
                    }

                    html += `
                        <div class="bg-white rounded-4 p-4 border mb-3 shadow-sm" style="border-color: rgba(148, 163, 184, 0.35) !important;">
                            <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                                <span class="fw-bold text-uppercase ${textColorClass}" style="font-size: 0.95rem;">
                                    <span class="material-symbols-rounded" style="vertical-align: text-bottom; font-size: 1.1rem;">
                                        ${iconName}
                                    </span>
                                    ${type.toUpperCase()} ITEM
                                </span>
                                <span class="small text-secondary" style="font-size: 0.8rem;">${formattedDate}</span>
                            </div>

                            <div class="row">
                                <div class="col-sm-4 col-12 mb-2" style="font-size: 0.95rem;">
                                    <span class="text-secondary fw-semibold d-block" style="font-size: 0.85rem;">Reporter</span>
                                    <div class="text-dark bg-light p-2 rounded-2 mt-1">
                                        #${ticket.user_id} - ${firstName}
                                    </div>
                                </div>
                                <div class="col-sm-4 col-12 mb-2" style="font-size: 0.95rem;">
                                    <span class="text-secondary fw-semibold d-block" style="font-size: 0.85rem;">Contact Number</span>
                                    <div class="text-dark bg-light p-2 rounded-2 mt-1">
                                        ${contactStr}
                                    </div>
                                </div>
                                <div class="col-sm-4 col-12 mb-2" style="font-size: 0.95rem;">
                                    <span class="text-secondary fw-semibold d-block" style="font-size: 0.85rem;">Bus Number</span>
                                    <div class="text-dark bg-light p-2 rounded-2 mt-1">${busNum}</div>
                                </div>
                            </div>

                            <div class="mb-2" style="font-size: 0.95rem;">
                                <span class="text-secondary fw-semibold d-block" style="font-size: 0.85rem;">Item Description</span>
                                <div class="text-dark bg-light p-2 rounded-2 mt-1" style="white-space: pre-wrap;">${ticket.item_description}</div>
                            </div>

                            ${imagesHtml}

                            <hr class="mt-4 mb-3" style="border-color: #eee;">

                            <div class="d-flex justify-content-between align-items-center">
                                <div class="d-flex align-items-center gap-2">
                                    <span class="text-secondary fw-semibold d-block m-0" style="font-size: 0.85rem;">Status:</span>
                                    <select id="statusSelect-${id}" class="form-select rounded-pill px-3 py-1 fw-semibold text-dark border-0 bg-light" onchange="updateStatus(${id})" style="font-size: 0.8rem; box-shadow: inset 0 0 0 1px #e5e7eb;">
                                        <option value="open" ${status === 'open' ? 'selected' : ''}>Open</option>
                                        <option value="resolved" ${status === 'resolved' ? 'selected' : ''}>Resolved</option>
                                        <option value="closed" ${status === 'closed' ? 'selected' : ''}>Closed</option>
                                    </select>
                                </div>

                                <button type="button" class="btn btn-danger rounded-pill px-3 py-1 fw-bold shadow-sm" onclick="deleteTicket(${id})" style="background-color: #b91c1c; border-color: #b91c1c; font-size: 0.8rem;">Delete</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;

            } catch (err) {
                console.error(err);
                showAlert('Failed to connect to the server.', 'danger');
            }
        }

        async function updateStatus(id) {
            const status = document.getElementById(`statusSelect-${id}`).value;
            const formData = new FormData();
            formData.append('action', 'update_status');
            formData.append('id', id);
            formData.append('status', status);

            try {
                const res = await fetch('manageLostAndFound.php', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    showAlert(data.message || 'Ticket status updated.');
                    loadTickets();
                } else {
                    showAlert(data.error || 'Failed to update ticket status.', 'danger');
                }
            } catch(err) {
                console.error(err);
                showAlert('Failed to connect to the server.', 'danger');
            }
        }

        async function deleteTicket(id) {
            if (!confirm(`Permanently delete ticket #${id}?`)) {
                return;
            }
            const formData = new FormData();
            formData.append('action', 'delete_ticket');
            formData.append('id', id);

            try {
                const res = await fetch('manageLostAndFound.php', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    showAlert(data.message || 'Ticket deleted successfully.');
                    loadTickets();
                } else {
                    showAlert(data.error || 'Failed to delete ticket.', 'danger');
                }
            } catch(err) {
                console.error(err);
                showAlert('Failed to connect to the server.', 'danger');
            }
        }

        document.addEventListener('DOMContentLoaded', loadTickets);
    </script>
</body>

</html>
