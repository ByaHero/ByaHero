<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <link rel="icon" href="../assets/images/byaheroLogoBlue.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <title>ByaHero — Waiting Passengers</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/admin/manageWaitingPassengers.css">
</head>

<body data-page-title="Waiting Passengers" data-page-type="generic" data-back-link="index.html">

    <div id="navbar-top-placeholder"></div>

    <div class="container py-4">
        <!-- Alert Banner -->
        <div id="alertBanner" class="alert d-none alert-dismissible fade show shadow-sm mt-3" role="alert">
            <span id="alertIcon" class="material-symbols-rounded align-middle me-2"></span>
            <span id="alertMessage"></span>
            <button type="button" class="btn-close" onclick="closeAlert()"></button>
        </div>

        <div class="row g-4 mt-1 mb-5">
            <div class="col-lg-8 mx-auto">
                
                <!-- Dynamic Count Stats Card -->
                <div class="card border-0 rounded-4 shadow-sm bg-white mb-4">
                    <div class="card-body p-4">
                        <div class="row align-items-center">
                            <div class="col-sm-5 border-end text-center text-sm-start mb-3 mb-sm-0">
                                <div class="text-muted small text-uppercase fw-bold mb-1">Total Waiting</div>
                                <div class="d-flex align-items-center justify-content-center justify-content-sm-start gap-3">
                                    <span class="display-4 fw-bold text-dark" id="totalWaitingVal">0</span>
                                    <span class="badge rounded-pill px-3 py-2 border d-inline-flex align-items-center gap-1" style="background: #dcfce7; color: #15803d; border-color: #bbf7d0 !important;">
                                        <span class="pulse-dot"></span> Active
                                    </span>
                                </div>
                            </div>
                            <div class="col-sm-7 ps-sm-4">
                                <div class="text-muted small text-uppercase fw-bold mb-2">Busiest Locations</div>
                                <div id="busiestLocationsContainer" class="d-flex flex-wrap gap-2">
                                    <div class="text-muted small py-1">No passenger waiting signals registered right now.</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Main Interactive Card -->
                <div class="card border-0 rounded-4 shadow-sm bg-white">
                    <div class="card-header bg-white border-bottom fw-bold p-3 d-flex justify-content-between align-items-center flex-wrap gap-2" style="border-radius: 16px 16px 0 0;">
                        <div class="d-flex align-items-center gap-2">
                            <span class="material-symbols-rounded text-primary fs-3">hail</span>
                            <span class="fs-4 text-primary fw-bold">Waiting Passengers Directory</span>
                        </div>
                        
                        <!-- Premium Auto-Refresh Countdown UI -->
                        <div class="small text-secondary d-flex align-items-center gap-2">
                            <button type="button" id="btn-manual-refresh" class="btn btn-sm btn-light border rounded-pill d-flex align-items-center gap-1 py-1 px-3 fs-7" title="Force Refresh">
                                <span class="material-symbols-rounded fs-6 align-middle">refresh</span>
                                <span>Refresh Now</span>
                            </button>
                            <div class="d-flex align-items-center gap-1 border rounded-pill px-3 py-1 bg-light fs-8">
                                <span class="material-symbols-rounded fs-7 text-secondary">update</span>
                                <span>Auto-refresh: <strong id="countdown-sec">30</strong>s</span>
                            </div>
                        </div>
                    </div>

                    <div class="card-body">
                        <!-- Progress Bar for Countdown -->
                        <div class="progress mb-4" style="height: 3px;">
                            <div id="countdown-progress" class="progress-bar bg-primary" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>

                        <!-- Client-Side Filter Inputs -->
                        <div class="p-2 bg-light border mb-4" style="border-radius: 12px;">
                            <div class="row g-2">
                                <div class="col-sm-12">
                                    <select id="filterLocation" class="form-select" style="border-radius: 8px;">
                                        <option value="">All Stop Locations</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- List Container -->
                        <div id="passengers-container">
                            <div class="text-center py-5">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>
                        </div>

                        <!-- Empty Search Results Message -->
                        <div id="noResultsMessage" class="text-center py-5 d-none">
                            <span class="material-symbols-rounded display-3 text-secondary opacity-50 mb-2">person_search</span>
                            <h6 class="fw-bold text-muted">No Matching Waiting Passengers</h6>
                            <p class="text-secondary small">Try adjusting your filters or spelling above.</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="navbar-menu-placeholder"></div>
    <div id="navbar-bottom-placeholder"></div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbarAdmin.js"></script>

    <script>
        let countdown = 30;
        const maxCountdown = 30;
        let countdownInterval = null;

        function closeAlert() {
            document.getElementById('alertBanner').classList.add('d-none');
        }

        function showAlert(message, type = 'success') {
            const banner = document.getElementById('alertBanner');
            const icon = document.getElementById('alertIcon');
            banner.className = `alert alert-${type} alert-dismissible fade show shadow-sm mt-3`;
            icon.textContent = type === 'success' ? 'check_circle' : 'error';
            document.getElementById('alertMessage').textContent = message;
            banner.classList.remove('d-none');
            setTimeout(() => {
                banner.classList.add('d-none');
            }, 5000);
        }

        async function loadWaitingList() {
            try {
                const res = await fetch('manageWaitingPassengers.php?json=1');
                const data = await res.json();
                
                if (data.success === false) {
                    showAlert(data.error || 'Failed to fetch waiting passengers directory.', 'danger');
                    return;
                }

                // Populate Total Counts
                document.getElementById('totalWaitingVal').textContent = data.totalWaiting;

                // Populate Busiest Locations
                const busiestContainer = document.getElementById('busiestLocationsContainer');
                busiestContainer.innerHTML = '';
                const locationsKeys = Object.keys(data.locationCounts);
                
                if (locationsKeys.length === 0) {
                    busiestContainer.innerHTML = `<div class="text-muted small py-1">No passenger waiting signals registered right now.</div>`;
                } else {
                    locationsKeys.slice(0, 4).forEach(loc => {
                        const count = data.locationCounts[loc];
                        const shortName = loc.split(',')[0];
                        busiestContainer.innerHTML += `
                            <span class="badge bg-light text-dark border rounded-pill px-3 py-2 d-flex align-items-center gap-1">
                                <span class="material-symbols-rounded text-primary fs-6">directions_bus</span>
                                <strong>${shortName}:</strong> ${count} waiting
                            </span>
                        `;
                    });
                }

                // Populate Filter Location Select
                const filterLocation = document.getElementById('filterLocation');
                const prevFilter = filterLocation.value;
                filterLocation.innerHTML = '<option value="">All Stop Locations</option>';
                data.location_whitelist.forEach(whitelistLoc => {
                    const opt = document.createElement('option');
                    opt.value = whitelistLoc;
                    opt.textContent = whitelistLoc;
                    
                    if (data.locationCounts[whitelistLoc]) {
                        opt.classList.add('fw-bold', 'text-primary');
                        opt.textContent += ` (${data.locationCounts[whitelistLoc]} waiting)`;
                    }
                    if (whitelistLoc === prevFilter) {
                        opt.selected = true;
                    }
                    filterLocation.appendChild(opt);
                });

                // Populate Cards list
                const container = document.getElementById('passengers-container');
                container.innerHTML = '';
                
                if (locationsKeys.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-5">
                            <span class="material-symbols-rounded display-1 text-muted opacity-50 mb-3">hail</span>
                            <h5 class="fw-bold text-muted">No Waiting Signals Registered</h5>
                            <p class="text-secondary small max-width-350 mx-auto">There are currently no passengers active at any of the ByaHero transit stops. Real-time updates will dynamically populate here when they signal.</p>
                        </div>
                    `;
                    return;
                }

                locationsKeys.forEach(locName => {
                    const count = data.locationCounts[locName];
                    const card = document.createElement('div');
                    card.className = 'passenger-card border rounded-4 bg-white p-3 mb-3';
                    card.setAttribute('data-location', locName);
                    card.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                            <span class="fw-bold text-primary text-uppercase" style="font-size: 0.95rem;">
                                <span class="material-symbols-rounded" style="vertical-align: text-bottom; font-size: 1.1rem;">
                                    location_on
                                </span>
                                ${locName}
                            </span>
                            <span class="small text-secondary d-flex align-items-center gap-1">
                                <span class="spinner-grow spinner-grow-sm text-success" role="status" style="width: 8px; height: 8px;"></span>
                                Active
                            </span>
                        </div>

                        <div class="row">
                            <div class="col-sm-12 mb-2" style="font-size: 0.95rem;">
                                <span class="text-primary fw-semibold d-block" style="font-size: 0.85rem;">Passengers Waiting</span>
                                <div class="text-dark bg-light p-2 rounded-2 mt-1 fw-bold fs-5 text-primary">
                                    ${count} passenger${count > 1 ? 's' : ''}
                                </div>
                            </div>
                        </div>

                        <div class="row mt-2">
                            <div class="col-sm-12 d-flex justify-content-end align-items-center">
                                <button type="button" class="btn btn-danger rounded-pill px-3 py-2 fw-bold shadow-sm" onclick="dismissLocation('${locName}')" style="background-color: #ef4444; border-color: #ef4444; font-size: 0.8rem; display: flex; align-items: center; gap: 4px;">
                                    <span class="material-symbols-rounded fs-6">cancel</span>
                                    <span>Dismiss All Signals Here</span>
                                </button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

                filterPassengers();

            } catch (err) {
                console.error(err);
                showAlert('Failed to connect to the server.', 'danger');
            }
        }

        async function dismissLocation(locationName) {
            if (!confirm(`Dismiss all waiting signals for ${locationName}?`)) {
                return;
            }
            const formData = new FormData();
            formData.append('action', 'cancel_location');
            formData.append('location', locationName);

            try {
                const res = await fetch('manageWaitingPassengers.php', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    showAlert(data.message || 'Waiting signals dismissed.');
                    loadWaitingList();
                } else {
                    showAlert(data.error || 'Failed to dismiss waiting signals.', 'danger');
                }
            } catch(err) {
                console.error(err);
                showAlert('Failed to connect to the server.', 'danger');
            }
        }

        function filterPassengers() {
            const selectedLocation = document.getElementById('filterLocation').value;
            const passengerCards = document.querySelectorAll('.passenger-card');
            const noResultsDiv = document.getElementById('noResultsMessage');

            let visibleCount = 0;

            passengerCards.forEach(card => {
                const location = card.getAttribute('data-location');
                const matchesLocation = !selectedLocation || location === selectedLocation;

                if (matchesLocation) {
                    card.classList.remove('d-none');
                    visibleCount++;
                } else {
                    card.classList.add('d-none');
                }
            });

            if (noResultsDiv) {
                if (visibleCount === 0 && passengerCards.length > 0) {
                    noResultsDiv.classList.remove('d-none');
                } else {
                    noResultsDiv.classList.add('d-none');
                }
            }
        }

        function startTimer() {
            countdown = maxCountdown;
            const countdownText = document.getElementById('countdown-sec');
            const progressBar = document.getElementById('countdown-progress');

            if (countdownInterval) clearInterval(countdownInterval);

            countdownInterval = setInterval(() => {
                countdown--;
                if (countdownText) countdownText.textContent = countdown;
                if (progressBar) {
                    const percent = ((maxCountdown - countdown) / maxCountdown) * 100;
                    progressBar.style.width = percent + '%';
                }

                if (countdown <= 0) {
                    loadWaitingList();
                    countdown = maxCountdown;
                }
            }, 1000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadWaitingList();
            startTimer();

            document.getElementById('filterLocation').addEventListener('change', filterPassengers);

            document.getElementById('btn-manual-refresh').addEventListener('click', () => {
                loadWaitingList();
                startTimer();
                showAlert('Refreshed waiting passenger records.');
            });
        });
    </script>
</body>

</html>
