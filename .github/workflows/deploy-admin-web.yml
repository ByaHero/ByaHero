name: Deploy Admin Web to AlwaysData

on:
  push:
    branches:
      - main
    paths:
      - 'byahero-admin-web/**'
      - '.github/workflows/deploy-admin-web.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'byahero-admin-web/package-lock.json'

      - name: Install dependencies
        run: |
          cd byahero-admin-web
          npm ci

      - name: Build project
        run: |
          cd byahero-admin-web
          npm run build

      - name: Upload via FTP to AlwaysData
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.ALWAYSDATA_ADMIN_FTP_SERVER }}
          username: ${{ secrets.ALWAYSDATA_ADMIN_FTP_USERNAME }}
          password: ${{ secrets.ALWAYSDATA_ADMIN_FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./byahero-admin-web/dist/
          server-dir: ./www/
