name: Deploy Python AI to AlwaysData

on:
  push:
    branches:
      - main
    paths:
      - 'byahero-ai/**'
      - '.github/workflows/alwaysdata-ai.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get latest code
        uses: actions/checkout@v3

      - name: Upload Python API via lftp (FTPS)
        env:
          FTP_USER: ${{ secrets.AI_ALWAYSDATA_FTP_USERNAME }}
          FTP_PASS: ${{ secrets.AI_ALWAYSDATA_FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.AI_ALWAYSDATA_FTP_SERVER }}
        run: |
          sudo apt-get update && sudo apt-get install lftp -y
          lftp -c "set ftp:ssl-allow yes; set ssl:verify-certificate no; open -u $FTP_USER,'$FTP_PASS' $FTP_HOST; mirror -R --exclude .git/ --exclude __pycache__/ ./byahero-ai /byahero-ai"
