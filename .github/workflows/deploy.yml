name: 🚀 Deploy ByaHero to Googiehost FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy Web Files
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
      
    - name: 📂 Sync files to Googiehost FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        local-dir: ./
        server-dir: public_html/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          .github/**
          .env
          deploy.js
          package.json
          package-lock.json
          capacitor.config.json
          android/**
          www/**
          scratch/**
          .claude/**
          README.md
          LICENSE
          .dockerignore
          Dockerfile
