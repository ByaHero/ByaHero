<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="../assets/images/byaheroLogoBlue.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Notifications - ByaHero</title>

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" rel="stylesheet" />
  <link href="../css/bootstrap.min.css" rel="stylesheet">
  <meta name="theme-color" content="#1e3a8a">

  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background-color: #fff;
      padding-top: 54px;
      padding-bottom: 20px;
    }

    :root {
      --bs-primary: #1e3a8a;
      --bs-primary-rgb: 30, 58, 138;
      --bs-bg-light: #f3f4f6;
    }

    .passenger-topbar-sticky {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      width: 100%;
      z-index: 2002 !important;
    }

    .hover-bg-white-10:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .no-notifications-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 2rem;
    }

    .no-notifications-icon {
      font-size: 5rem;
      color: #6b7280;
      margin-bottom: 1rem;
    }

    .no-notifications-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: #1e3a8a;
      margin-bottom: 0.5rem;
    }

    .no-notifications-text {
      color: #6b7280;
      margin-bottom: 1.5rem;
      max-width: 400px;
    }

    .unread-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <!-- Header Top Bar Component -->
  <div class="bg-primary d-flex align-items-center justify-content-between rounded-bottom-4 px-3 shadow-sm position-absolute top-0 start-0 z-3 w-100 passenger-topbar-sticky" style="height: 40px;">
    <div class="d-flex align-items-center">
      <a href="index.html" class="text-white text-decoration-none d-flex align-items-center p-1 rounded-circle hover-bg-white-10">
        <span class="material-symbols-rounded text-white" style="font-size: 24px;">close</span>
      </a>
      <h6 class="h5 mb-0 text-white fw-normal ms-2" style="font-size: 1.1rem;">Notifications</h6>
    </div>
  </div>

  <div id="loadingSpinner" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <!-- Empty State Container -->
  <div id="noNotifications" class="no-notifications-container d-none">
    <span class="material-symbols-rounded no-notifications-icon">notifications_off</span>
    <div class="no-notifications-title">Notifications Disabled</div>
    <p class="no-notifications-text">
      You haven't enabled any notifications yet. Turn on Smart Notifications to stay updated about bus schedules, arrivals, and seat availability.
    </p>
    <a href="passengerSettings/smartNotification.html" class="btn btn-primary rounded-pill px-4">
      <span class="material-symbols-rounded align-middle me-1" style="font-size: 1.2rem;">notifications_active</span>
      Enable Notifications
    </a>
  </div>

  <!-- Notifications List -->
  <div id="notificationsList" class="list-group list-group-flush d-none">
    <!-- Today section header -->
    <div class="px-4 py-3 pb-1" id="sectionTodayHeader">
      <h6 class="fw-bold text-dark small mb-0">Today</h6>
    </div>

    <!-- SOS Alerts Section -->
    <div id="sosSection">
      <div class="px-4 py-2 bg-light">
        <h6 class="fw-bold text-danger small mb-0">SOS Alerts</h6>
      </div>
      <div id="sosList"></div>
    </div>

    <!-- Smart Notifications Section -->
    <div id="smartSection" class="mt-3">
      <div class="px-4 py-2 bg-light">
        <h6 class="fw-bold text-primary small mb-0">Smart Notifications</h6>
      </div>
      <div id="smartList"></div>
    </div>
  </div>

  <script src="../js/bootstrap.bundle.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const SERVER_URL = localStorage.getItem('byahero_server_url') || 'https://byahero.app';
      
      const spinner = document.getElementById('loadingSpinner');
      const emptyState = document.getElementById('noNotifications');
      const listContainer = document.getElementById('notificationsList');
      const sosSection = document.getElementById('sosSection');
      const sosList = document.getElementById('sosList');
      const smartSection = document.getElementById('smartSection');
      const smartList = document.getElementById('smartList');

      if (!navigator.onLine) {
        spinner.classList.add('d-none');
        emptyState.querySelector('.no-notifications-title').textContent = "You are Offline";
        emptyState.querySelector('.no-notifications-text').textContent = "Notifications are only accessible online. Please check your internet connection.";
        emptyState.querySelector('a').classList.add('d-none');
        emptyState.classList.remove('d-none');
        return;
      }

      try {
        // Fetch notifications list from server wrapper
        const res = await fetch(SERVER_URL + '/public/passenger/notifications.php?json=1', {
          credentials: 'include',
          cache: 'no-store'
        });
        const data = await res.json();

        spinner.classList.add('d-none');

        if (!data.success) {
          emptyState.querySelector('.no-notifications-title').textContent = "Authentication Error";
          emptyState.querySelector('.no-notifications-text').textContent = data.message || "Failed to load notifications.";
          emptyState.classList.remove('d-none');
          return;
        }

        const sosAlerts = data.sos_alerts || [];
        const smartNotifications = data.notifications || [];

        // Check if smart notifications settings are all disabled and there is no history
        const hasSettings = data.notify_bus_schedule || data.notify_bus_arrival || data.notify_seat_availability;
        const hasHistory = sosAlerts.length > 0 || smartNotifications.length > 0;

        if (!hasSettings && !hasHistory) {
          emptyState.classList.remove('d-none');
          return;
        }

        listContainer.classList.remove('d-none');

        // Render SOS
        if (sosAlerts.length > 0) {
          sosSection.classList.remove('d-none');
          sosList.innerHTML = sosAlerts.map(a => {
            const dateStr = formatDate(a.created_at);
            const sender = a.sender_name || a.sender_email || 'Unknown';
            const isUnread = a.status === 'active';
            return `
              <div class="list-group-item border-0 px-4 py-3 d-flex align-items-start gap-3">
                <div class="mt-1">
                  <span class="material-symbols-rounded fs-2 text-danger">warning</span>
                </div>
                <div class="flex-grow-1">
                  <div class="d-flex justify-content-between align-items-center mb-1">
                    <span class="fw-bold text-dark" style="font-size: 0.95rem;">SOS from ${escapeHtml(sender)}</span>
                    <small class="text-muted" style="font-size: 0.75rem;">${dateStr}</small>
                  </div>
                  <p class="text-muted small mb-0" style="line-height: 1.4;">
                    ${escapeHtml(a.location_text || 'Location not provided')}
                  </p>
                  <hr class="mt-3 mb-0 text-secondary opacity-25">
                </div>
                ${isUnread ? '<div class="mt-2"><span class="d-inline-block unread-dot bg-danger"></span></div>' : ''}
              </div>
            `;
          }).join('');
        } else {
          sosSection.classList.add('d-none');
        }

        // Render Smart Notifications
        if (smartNotifications.length > 0) {
          smartSection.classList.remove('d-none');
          smartList.innerHTML = smartNotifications.map(n => {
            const dateStr = formatDate(n.created_at);
            const iconDetails = getIconDetails(n.type);
            const isUnread = !n.read_at;
            return `
              <div class="list-group-item border-0 px-4 py-3 d-flex align-items-start gap-3">
                <div class="mt-1">
                  <span class="material-symbols-rounded fs-2 ${iconDetails.class}">${iconDetails.icon}</span>
                </div>
                <div class="flex-grow-1">
                  <div class="d-flex justify-content-between align-items-center mb-1">
                    <span class="fw-bold text-dark" style="font-size: 0.95rem;">${escapeHtml(n.title)}</span>
                    <small class="text-muted" style="font-size: 0.75rem;">${dateStr}</small>
                  </div>
                  <p class="text-muted small mb-0" style="line-height: 1.4;">
                    ${escapeHtml(n.message)}
                  </p>
                  <hr class="mt-3 mb-0 text-secondary opacity-25">
                </div>
                ${isUnread ? '<div class="mt-2"><span class="d-inline-block unread-dot bg-primary"></span></div>' : ''}
              </div>
            `;
          }).join('');
        } else {
          smartList.innerHTML = `<div class="px-4 py-3 text-muted small">No smart notifications yet. Open the map to generate alerts.</div>`;
        }

      } catch (err) {
        console.error(err);
        spinner.classList.add('d-none');
        emptyState.querySelector('.no-notifications-title').textContent = "Network Error";
        emptyState.querySelector('.no-notifications-text').textContent = "An error occurred while connecting to the server.";
        emptyState.classList.remove('d-none');
      }
    });

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr.replace(/-/g, "/"));
      if (isNaN(date.getTime())) return dateStr;
      
      const options = { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true };
      return date.toLocaleDateString('en-US', options);
    }

    function getIconDetails(type) {
      const t = String(type || '').toLowerCase();
      if (t === 'bus_arrival') {
        return { icon: 'location_on', class: 'text-primary' };
      }
      if (t === 'seat_full') {
        return { icon: 'airline_seat_recline_normal', class: 'text-danger' };
      }
      return { icon: 'notifications', class: 'text-secondary' };
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
  </script>
</body>

</html>
